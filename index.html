<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #c9a84c;
  --accent2: #e8c96a;
  --bg: #0f0d0b;
  --surface: #1a1714;
  --surface2: #231f1b;
  --surface3: #2e2924;
  --border: #3a332c;
  --cream: #f5ead8;
  --text: #f0e6d3;
  --text2: #b0a090;
  --text3: #6b5f52;
  --red: #e05a4e;
  --green: #5aab7a;
  --blue: #5a8fc9;
  --r: 12px;
  --sh: 0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
h1,h2,h3{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* TOAST */
#toast-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border);border-left:4px solid var(--accent);padding:10px 14px;border-radius:8px;font-size:13px;max-width:300px;animation:tslide .3s ease;pointer-events:auto}
.toast.err{border-left-color:var(--red)}.toast.ok{border-left-color:var(--green)}.toast.info{border-left-color:var(--blue)}
@keyframes tslide{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* NOTIFICATION CORNER */
#notif-wrap{position:fixed;bottom:70px;left:16px;z-index:9998;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.notif{background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:10px 14px;font-size:13px;max-width:260px;animation:tslide .3s ease;box-shadow:var(--sh)}
.notif .notif-title{font-weight:700;color:var(--accent);font-size:12px;margin-bottom:2px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-full{width:100%}
.btn-gold{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1000}
.btn-gold:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{filter:brightness(1.1)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{filter:brightness(1.1)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:5px}
.btn-icon{width:32px;height:32px;padding:0;border-radius:6px}

/* INPUTS */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border .2s;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:6px 10px;font-size:13px}
select.inp option{background:var(--surface2)}
.input-row{display:flex;gap:8px}
.input-row .field{flex:1}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#2a1f0e,#0f0d0b)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:360px;box-shadow:var(--sh)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:30px;color:var(--accent)}
.login-logo p{font-size:11px;color:var(--text3);letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.login-suffix{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.login-or{text-align:center;color:var(--text3);font-size:12px;margin:14px 0;position:relative}
.login-or::before,.login-or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.login-or::before{left:0}.login-or::after{right:0}

/* GUEST PAGE */
#guest-screen{min-height:100vh;display:none}
.guest-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px}
.guest-header h2{font-size:20px;color:var(--accent);flex:1}
.guest-body{padding:20px}
.guest-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--text2)}
.guest-tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.guest-table{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s}
.guest-table:hover{border-color:var(--accent);transform:translateY(-2px)}
.guest-table.occupied{border-color:var(--green);background:#0a1f12}
.guest-table .tnum{font-size:24px;font-weight:700;color:var(--text);font-family:'Playfair Display',serif}
.guest-table .tstatus{font-size:11px;color:var(--text3);margin-top:3px}

/* APP LAYOUT */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-size:20px;color:var(--accent)}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;color:var(--text2);transition:all .2s;border-left:3px solid transparent;font-size:13px;font-weight:500}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{font-size:17px;width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b6914);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#1a1000;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--text3)}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px}
.logout-btn:hover{color:var(--red)}
.main{margin-left:220px;padding:22px;min-height:100vh;transition:margin .3s}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:20px}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99}

/* PAGE */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ph-title{font-size:24px;color:var(--cream)}
.ph-sub{font-size:12px;color:var(--text3);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;color:var(--cream);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title-left{display:flex;align-items:center;gap:8px}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:8px}
.tbl-wrap::-webkit-scrollbar-track{background:var(--bg2);border-radius:4px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.tbl-wrap::-webkit-scrollbar-thumb:hover{background:var(--accent)}
table{width:100%;border-collapse:collapse}
/* Bảng có data dài cần scroll ngang — không cho text wrap */
.tbl-nowrap{min-width:700px}
.tbl-nowrap td, .tbl-nowrap th{white-space:nowrap}
.tbl-nowrap td.wrap{white-space:normal;min-width:140px;max-width:260px}
th{text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}

/* TAGS */
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tag-gold{background:#2a2010;color:var(--accent);border:1px solid #4a3a18}
.tag-green{background:#0f2a1a;color:var(--green);border:1px solid #1a4a2a}
.tag-blue{background:#0f1e2a;color:var(--blue);border:1px solid #1a304a}
.tag-red{background:#2a0f0e;color:var(--red);border:1px solid #4a1e1a}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh)}
.modal-lg{max-width:680px}
.modal-title{font-size:18px;color:var(--cream);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px}
.modal-close:hover{color:var(--red)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:1px solid var(--border);transition:all .2s}
.tab.active{background:var(--accent);color:#1a1000;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* COLOR PICKER */
.color-swatches{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.swatch.active{border-color:var(--text);transform:scale(1.15)}
.theme-card{cursor:pointer;border:2px solid var(--border);border-radius:10px;padding:8px;transition:all .2s;width:90px;text-align:center}
.theme-card:hover{transform:translateY(-2px)}
.theme-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.theme-preview{width:100%;height:42px;border-radius:6px;border:1px solid;padding:5px;display:flex;flex-direction:column;justify-content:center}
.theme-name{font-size:11px;font-weight:600;margin-top:6px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.stat-val{font-size:26px;font-weight:700;color:var(--cream);margin-top:4px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* POS TABLES */
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.t-card{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;min-height:95px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;user-select:none}
.t-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.t-card.occupied{border-color:var(--green);background:#0a1f12}
.t-card.selected{box-shadow:0 0 0 3px rgba(201,168,76,.35);border-color:var(--accent2)}
.t-card .tnum{font-size:22px;font-weight:700;font-family:'Playfair Display',serif}
.t-card .tstatus{font-size:10px;color:var(--text3)}
.t-card .tamount{font-size:12px;color:var(--green);font-weight:600}
.t-card .tstaff{font-size:10px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ORDER PANEL */
.order-panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transform:translateX(100%);transition:transform .3s}
.order-panel.open{transform:translateX(0)}
.op-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.op-title{font-size:17px;font-weight:700;flex:1}
.op-body{flex:1;overflow-y:auto;padding:10px}
.oi{background:var(--surface2);border-radius:8px;padding:9px 11px;margin-bottom:7px;display:flex;align-items:flex-start;gap:8px}
.oi-info{flex:1;min-width:0}
.oi-name{font-size:13px;font-weight:600}
.oi-meta{font-size:11px;color:var(--text3);margin-top:2px}
.oi-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.oi-price{font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap}
.qty-ctrl{display:flex;align-items:center;gap:5px}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--surface3);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-btn:hover{border-color:var(--accent);color:var(--accent)}
.qty-num{font-size:13px;font-weight:700;min-width:18px;text-align:center}
.qty-badge{display:inline-block;background:var(--accent);color:#1a1000;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:4px}
.op-foot{padding:14px;border-top:1px solid var(--border)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.total-label{font-size:13px;color:var(--text2)}
.total-amt{font-size:20px;font-weight:700;color:var(--accent2)}
.op-actions{display:flex;gap:6px}

/* MENU MODAL */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:10px}
.mi{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .2s}
.mi:hover{border-color:var(--accent);transform:translateY(-2px)}
.mi-name{font-size:12px;font-weight:600;margin-bottom:2px}
.mi-size{font-size:10px;color:var(--text3)}
.mi-price{font-size:12px;color:var(--accent)}

/* FOLDER TREE */
.folder{margin-bottom:10px}
.folder-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;user-select:none;border:1px solid var(--border)}
.folder-head:hover{border-color:var(--accent)}
.folder-arrow{transition:transform .2s;font-size:11px}
.folder-body{padding:6px 0 0 16px;display:none}
.folder-body.open{display:block}
.folder-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-radius:7px;margin-bottom:4px;background:var(--surface);border:1px solid var(--border)}
.sub-folder{margin-bottom:6px}
.sub-folder-head{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface3);border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;border:1px solid var(--border)}
.sub-folder-body{padding:4px 0 0 14px;display:none}
.sub-folder-body.open{display:block}

/* TOPPING */
.topping-wrap{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.tchip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--text2);transition:all .2s;user-select:none}
.tchip.sel{background:var(--accent);color:#1a1000;border-color:var(--accent)}
.tchip:hover:not(.sel){border-color:var(--accent);color:var(--accent)}

/* SIZE PICKER */
.size-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:10px}
.size-opt{padding:12px 8px;border-radius:9px;border:2px solid var(--border);cursor:pointer;text-align:center;transition:all .2s}
.size-opt:hover{border-color:var(--accent)}
.size-opt .s-name{font-size:13px;font-weight:600}
.size-opt .s-price{font-size:12px;color:var(--accent);margin-top:3px}

/* RECEIPT PRINT - sẽ in từ popup riêng */

/* HISTORY */
.hist-item{background:var(--surface2);border-radius:9px;margin-bottom:10px;overflow:hidden}
.hist-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer}
.hist-head:hover{background:rgba(255,255,255,.03)}
.hist-body{padding:0 14px 12px;border-top:1px solid var(--border);display:none}
.hist-body.open{display:block}
.hist-item-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.hist-item-row:last-child{border-bottom:none}
.hist-log{font-size:11px;color:var(--text3);margin-top:6px;font-style:italic}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}

/* QR */
#qr-canvas{display:block;margin:0 auto}

/* MOBILE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .backdrop.show{display:block}
  .hamburger{display:flex;align-items:center}
  .main{margin-left:0;padding:14px;padding-top:52px}
  .order-panel{width:100%}
  .stats-grid{grid-template-columns:1fr 1fr}
  .input-row{flex-direction:column}
  .ph-title{font-size:19px}
}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
.spinner-inline{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;margin-right:6px}
/* Permission toggle switch */
.perm-toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.perm-toggle input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.perm-toggle-slider{position:relative;width:38px;height:20px;background:#3a332c;border-radius:20px;transition:.2s;flex-shrink:0}
.perm-toggle-slider::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.perm-toggle input:checked + .perm-toggle-slider{background:var(--accent)}
.perm-toggle input:checked + .perm-toggle-slider::after{transform:translateX(18px)}
.perm-toggle input:disabled + .perm-toggle-slider{opacity:.4;cursor:not-allowed}
.perm-toggle-label{font-size:11px;color:var(--text3);white-space:nowrap}
/* Revenue tabs */
.rev-tabs{display:inline-flex;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;overflow:hidden}
.rev-tab{background:transparent;border:0;color:var(--text3);font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;font-family:inherit}
.rev-tab:hover{color:var(--text2)}
.rev-tab.active{background:var(--accent);color:#1a1612;font-weight:600}
.rev-compare-toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;user-select:none;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);transition:all .15s}
.rev-compare-toggle:hover{border-color:var(--accent)}
.rev-compare-toggle input{accent-color:var(--accent);cursor:pointer}
.rev-compare-toggle input:checked + span{color:var(--accent2);font-weight:600}
.rev-compare-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:12px}
.rev-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.rev-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.rev-stat-val{font-size:18px;font-weight:700;margin:4px 0;font-family:'DM Sans',sans-serif}
.rev-stat-sub{font-size:11px;color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--text3);padding:32px;font-size:13px}
.divider{height:1px;background:var(--border);margin:12px 0}
.badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;font-weight:700;margin-left:4px}

/* ─── INVENTORY (kho) ─── */
.inv-tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px;overflow-x:auto}
.inv-tab{flex:1;min-width:110px;padding:10px 14px;background:transparent;border:none;color:var(--text2);font-family:inherit;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;transition:all .2s;white-space:nowrap}
.inv-tab:hover{background:rgba(255,255,255,.04);color:var(--cream)}
.inv-tab.active{background:var(--accent);color:#1a1612}
.inv-scan-row{display:flex;gap:8px;align-items:stretch;flex-wrap:wrap}
.inv-scan-row .inp{flex:1;min-width:180px}
.inv-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px 16px;padding:12px;background:rgba(255,255,255,.02);border-radius:8px;margin-bottom:14px;font-size:13px}
.inv-lbl{color:var(--text3);font-size:11px;display:inline-block;min-width:90px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.inv-suggest-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto}
.inv-suggest-card{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s}
.inv-suggest-card:hover{background:rgba(201,168,76,.08);border-color:var(--accent);transform:translateX(2px)}
.inv-suggest-main{flex:1;min-width:0}
.inv-suggest-stock{text-align:right;flex-shrink:0;padding-left:8px;border-left:1px solid var(--border);min-width:60px}
.inv-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.inv-status-ok{background:rgba(76,175,80,.15);color:#7bc97f}
.inv-status-low{background:rgba(255,159,28,.18);color:#ff9f1c}
.inv-status-out{background:rgba(220,53,69,.20);color:#ff6b7a}
.inv-pill{display:inline-flex;align-items:center;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600}
.inv-pill-red{background:rgba(220,53,69,.15);color:#ff6b7a;border:1px solid rgba(220,53,69,.4)}
.inv-pill-orange{background:rgba(255,159,28,.15);color:#ff9f1c;border:1px solid rgba(255,159,28,.4)}
.inv-limit-btn{background:transparent;border:1px dashed transparent;color:var(--text2);font-family:inherit;font-size:13px;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .15s;min-width:50px}
.inv-limit-btn:hover{border-color:var(--accent);background:rgba(201,168,76,.08);color:var(--accent2)}
@media (max-width:520px){.grid-2{grid-template-columns:1fr}.inv-suggest-card{padding:8px 10px}}
</style>
</head>
<body>

<div id="toast-wrap"></div>
<div id="notif-wrap"></div>
<div id="receipt-iframe-wrap"></div>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1 id="login-shop-name">☕ CaféShop</h1>
      <p>POS SYSTEM</p>
    </div>
    <div class="field">
      <label>Tên đăng nhập</label>
      <div style="position:relative">
        <input class="inp" id="lu" placeholder="admin hoặc tên nhân viên" oninput="updateLoginSuffix()">
        <span class="login-suffix" id="lu-suffix"></span>
      </div>
    </div>
    <div class="field"><label>Mật khẩu</label><input class="inp" type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-gold btn-full" onclick="doLogin()">Đăng nhập</button>
    <div id="guest-login-wrap" style="display:none">
      <div class="login-or">hoặc</div>
      <button class="btn btn-outline btn-full" onclick="showGuest()">👤 Vào với tư cách khách</button>
    </div>
  </div>
</div>

<!-- ═══ GUEST PAGE ═══ -->
<div id="guest-screen">
  <div class="guest-header">
    <div>
      <h2 id="guest-shop-name">☕ CaféShop</h2>
      <div style="font-size:12px;color:var(--text3)" id="guest-shop-addr"></div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="showLogin()">🔑 Nhân viên đăng nhập</button>
  </div>
  <!-- Tab điều hướng guest -->
  <div style="display:flex;gap:4px;padding:12px 16px 0;border-bottom:1px solid var(--border);background:var(--surface)">
    <div class="tab active" id="gtab-call" onclick="switchGuestTab('call')">🛎️ Gọi nhân viên</div>
    <div class="tab" id="gtab-menu" onclick="switchGuestTab('menu')">📋 Xem menu</div>
  </div>
  <!-- Tab gọi nhân viên -->
  <div id="guest-tab-call" class="guest-body">
    <div class="guest-info">Chọn bàn của bạn:</div>
    <div class="guest-tables-grid" id="guest-tables-grid" style="margin-bottom:16px"></div>
    <!-- Nút hiện sau khi chọn bàn -->
    <div id="guest-action" style="display:none;gap:10px;flex-wrap:wrap">
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Bàn <strong id="guest-selected-num" style="color:var(--accent)"></strong> — Bạn cần:</div>
      <div style="display:flex;gap:10px;width:100%">
        <button class="btn btn-gold" onclick="doGuestCall('order')" style="flex:1">🍽️ Gọi nhân viên</button>
        <button class="btn btn-outline" onclick="doGuestCall('pay')" style="flex:1">💳 Tính tiền</button>
      </div>
    </div>
  </div>
  <!-- Tab menu -->
  <div id="guest-tab-menu" class="guest-body" style="display:none">
    <div id="guest-menu-content"><div class="spinner"></div></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h2 id="sb-shop-name">☕ CaféShop</h2>
      <p id="sb-shop-addr"></p>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-bottom">
      <div class="avatar" id="sb-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sb-uname"></div>
        <div class="user-role" id="sb-urole"></div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Đăng xuất">⏻</button>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<!-- ORDER PANEL -->
<div class="order-panel" id="order-panel">
  <div class="op-head">
    <div>
      <div class="op-title" id="op-title">Bàn --</div>
      <div style="font-size:11px;color:var(--text3)" id="op-meta"></div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="closeOP()">✕</button>
  </div>
  <div class="op-body" id="op-body"></div>
  <div class="op-foot">
    <div class="total-row">
      <span class="total-label">Tổng cộng</span>
      <span class="total-amt" id="op-total">0 ₫</span>
    </div>
    <div class="op-actions">
      <button class="btn btn-ghost btn-sm" onclick="openMergeModal()" title="Gộp bàn">🔗</button>
      <button class="btn btn-gold btn-sm" style="flex:1" onclick="openMenuModal()">+ Thêm món</button>
      <button class="btn btn-green btn-sm" onclick="openCheckout()">💳 Tính tiền</button>
    </div>
  </div>
</div>

<div id="modal-wrap"></div>

<script>
// ═══════════ STATE ═══════════
const ADMIN_EMAIL = 'admin@myapp.com';
const DOMAIN = '@myapp.com';
let currentUser = null, isAdmin = false, isGuest = false;
let currentUserFullName = ''; // Tên thật của người đang đăng nhập
let shopConfig = {}, groups = [], items = [], orders = {}, staffList = [];
let currentTableId = null, selectedToppings = [], guestMode = 'order';
let unsubOrders = null;
let localQtyChanges = {}; // { tableId: { key: newQty } } - thay đổi +/- chưa lưu

// Theme presets - mỗi theme đổi cả accent VÀ background, surface, border
const THEMES = [
  { name:'Cafe Vàng', accent:'#c9a84c', accent2:'#e8c96a',
    bg:'#0f0d0b', surface:'#1a1714', surface2:'#231f1b', surface3:'#2e2924',
    border:'#3a332c', text:'#f0e6d3', text2:'#b0a090', text3:'#6b5f52', cream:'#f5ead8' },
  { name:'Ocean Teal', accent:'#3dbfa0', accent2:'#5ed9bc',
    bg:'#0a1419', surface:'#0f1e26', surface2:'#152b35', surface3:'#1e3b48',
    border:'#244553', text:'#e0eef2', text2:'#90b0bc', text3:'#5a7a86', cream:'#d8ecef' },
  { name:'Rose Pink', accent:'#d4627a', accent2:'#f0849a',
    bg:'#15090e', surface:'#21121a', surface2:'#2c1822', surface3:'#3a212e',
    border:'#4a2a3a', text:'#f0d8df', text2:'#b89aa3', text3:'#7a5e68', cream:'#f5e0e6' },
  { name:'Indigo Tím', accent:'#7b72e9', accent2:'#9e97f5',
    bg:'#0d0b1a', surface:'#161226', surface2:'#1f1a35', surface3:'#2a2447',
    border:'#352c5c', text:'#e6e1f5', text2:'#a39ec2', text3:'#6a6588', cream:'#ece8f8' },
  { name:'Light Cream', accent:'#b8843d', accent2:'#d4a05a',
    bg:'#faf5ec', surface:'#ffffff', surface2:'#f3ecdb', surface3:'#e8dec5',
    border:'#d4c8a8', text:'#3a2e1a', text2:'#6b5a3a', text3:'#9e8a65', cream:'#5c4a2a' },
  { name:'Sage Xanh', accent:'#6b9e5e', accent2:'#88bb7a',
    bg:'#0d130b', surface:'#161e12', surface2:'#1d281a', surface3:'#283525',
    border:'#36452f', text:'#e0eadb', text2:'#9aaa90', text3:'#62725a', cream:'#dde7d6' },
  { name:'Midnight', accent:'#4a9eff', accent2:'#6db4ff',
    bg:'#080b14', surface:'#0e1320', surface2:'#161d2e', surface3:'#1f2940',
    border:'#2a3550', text:'#dde6f5', text2:'#8a98b3', text3:'#5a6680', cream:'#e5edf8' },
  { name:'Amber Cam', accent:'#e09a30', accent2:'#f5b84a',
    bg:'#140d05', surface:'#1f160a', surface2:'#2a1e10', surface3:'#382916',
    border:'#48381d', text:'#f5e4cc', text2:'#bda280', text3:'#7a6850', cream:'#f8ecd6' },
];
const ACCENTS = THEMES; // backward compat

// ═══════════ FIREBASE READY ═══════════
let disabledWatcherUnsub = null;
const APP_VERSION = 'v2.5-fixed-disabled';

window.addEventListener('firebase-ready', () => {
  console.log('CafeShop', APP_VERSION);
  const { onAuthStateChanged } = window._firebase;
  loadShopConfigPublic();
  onAuthStateChanged(window._auth, async u => {
    if (u) {
      currentUser = u;
      isAdmin = u.email === ADMIN_EMAIL;
      isGuest = false;

      if (!isAdmin) {
        // Check staff/active trước khi cho vào
        const staffSnap = await checkStaffActive(u.email);
        if (!staffSnap.allowed) {
          toast('🚫 Tài khoản bị vô hiệu hoá!', 'err');
          await window._firebase.signOut(window._auth);
          return;
        }
        // Lưu tên thật để dùng xuyên suốt
        currentUserFullName = staffSnap.fullName || u.email.split('@')[0];
        startDisabledWatcher(u.email);
      } else {
        currentUserFullName = 'Admin';
      }

      await loadAllData();
      showApp();
    } else {
      currentUser = null;
      isAdmin = false;
      stopDisabledWatcher();
      hideAll();
      showLogin();
    }
  });
});

// Check staff/active trong Firestore
// Trả về { allowed: bool, fullName: string }
async function checkStaffActive(email) {
  const emailLower = (email || '').toLowerCase().trim();
  try {
    const { collection, query, where, getDocs } = window._firebase;
    const q = query(collection(window._db, 'staff'), where('email', '==', emailLower));
    const snap = await getDocs(q);
    if (snap.empty) {
      return { allowed: true, fullName: emailLower.split('@')[0] };
    }
    const data = snap.docs[0].data();
    if (data.active === false) return { allowed: false, fullName: data.fullName || '' };
    return { allowed: true, fullName: data.fullName || emailLower.split('@')[0] };
  } catch(e) {
    console.warn('checkStaffActive error:', e.code);
    return { allowed: true, fullName: emailLower.split('@')[0] };
  }
}

// Realtime watcher: theo dõi staff doc của user đang login
// Nếu admin đổi active=false → kick ngay
// Nếu admin bỏ canInventory mà user đang ở tab Kho → đẩy về POS ngay
function startDisabledWatcher(email) {
  stopDisabledWatcher();
  const emailLower = (email || '').toLowerCase().trim();
  const { collection, query, where, onSnapshot } = window._firebase;
  const q = query(collection(window._db, 'staff'), where('email', '==', emailLower));
  disabledWatcherUnsub = onSnapshot(q, (snap) => {
    if (!currentUser || isAdmin) return;
    snap.docs.forEach(d => {
      const data = d.data();

      // Update cache local để getStaffNav() trả đúng quyền
      staffList = staffList.map(s => s.email === emailLower ? { ...s, ...data, id: d.id } : s);

      // 1) Bị khoá tài khoản -> đăng xuất
      if (data.active === false) {
        toast('🚫 Tài khoản của bạn vừa bị vô hiệu hoá!', 'err');
        stopDisabledWatcher();
        setTimeout(async () => {
          try { await window._firebase.signOut(window._auth); } catch(e){}
        }, 1200);
        return;
      }

      // 2) Bị bỏ quyền kho -> rebuild nav + kick khỏi tab Kho nếu đang ở đó
      const canInv = data.canInventory === true;
      buildNav();
      // Re-highlight tab đang active sau khi rebuild
      const navEl = document.getElementById('nav-' + currentPage);
      if (navEl) navEl.classList.add('active');

      if (!canInv && currentPage === 'inventory') {
        toast('🚫 Quyền quản lý kho của bạn vừa bị thu hồi', 'err');
        // Dừng camera nếu đang quét
        try { if (typeof closeScanner === 'function') closeScanner(); } catch(e){}
        // Đóng modal kho nếu đang mở
        try {
          const mw = document.getElementById('modal-wrap');
          if (mw && mw.innerHTML.includes('inv-')) mw.innerHTML = '';
        } catch(e){}
        setTimeout(() => navigateTo('pos'), 800);
      } else if (canInv && currentPage === 'pos') {
        // Vừa được CẤP quyền -> báo cho user biết có tab mới
        // (chỉ toast nhẹ, không tự chuyển trang vì user đang làm việc khác)
        toast('📦 Bạn vừa được cấp quyền Quản lý kho. Mở từ menu bên trái.', 'ok');
      }
    });
  });
}
function stopDisabledWatcher() {
  if (disabledWatcherUnsub) { disabledWatcherUnsub(); disabledWatcherUnsub = null; }
}

async function applyPendingPassword(user) { /* deprecated */ }

async function loadShopConfigPublic() {
  try {
    const { doc, getDoc } = window._firebase;
    const snap = await getDoc(doc(window._db, 'config', 'shop'));
    if (snap.exists()) {
      shopConfig = snap.data();
      applyAccent(shopConfig.accent || ACCENTS[0].accent, shopConfig.accent2 || ACCENTS[0].accent2);
      const n = shopConfig.name || 'CaféShop';
      document.getElementById('login-shop-name').textContent = '☕ ' + n;
      document.getElementById('guest-shop-name').textContent = '☕ ' + n;
      document.getElementById('guest-shop-addr').textContent = shopConfig.address || '';
      if (shopConfig.guestEnabled) document.getElementById('guest-login-wrap').style.display = 'block';
    }
  } catch(e){}
}

// ═══════════ AUTH ═══════════
function updateLoginSuffix() {
  const v = document.getElementById('lu').value.trim();
  document.getElementById('lu-suffix').textContent = (!v || v.includes('@')) ? '' : DOMAIN;
}

async function doLogin() {
  let u = document.getElementById('lu').value.trim().toLowerCase();
  const p = document.getElementById('lp').value;
  if (!u || !p) return toast('Nhập đầy đủ thông tin', 'err');
  if (!u.includes('@')) u += DOMAIN;
  try {
    const { signInWithEmailAndPassword } = window._firebase;
    await signInWithEmailAndPassword(window._auth, u, p);
  } catch(e) { toast('Sai tài khoản hoặc mật khẩu', 'err'); }
}
async function doLogout() {
  const { signOut } = window._firebase;
  await signOut(window._auth);
  // Xoá mật khẩu trong ô input để bảo mật
  const lp = document.getElementById('lp');
  const lu = document.getElementById('lu');
  if (lp) lp.value = '';
  if (lu) lu.value = '';
  const suf = document.getElementById('lu-suffix');
  if (suf) suf.textContent = '';
}
function hideAll() {
  ['login-screen','guest-screen','app'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}
function showLogin() {
  hideAll();
  // Đảm bảo ô password rỗng khi vào lại màn hình login
  const lp = document.getElementById('lp');
  if (lp) lp.value = '';
  document.getElementById('login-screen').style.display = 'flex';
}
function showGuest() {
  isGuest = true;
  hideAll();
  document.getElementById('guest-screen').style.display = 'block';
  loadGuestPage();
}

function switchGuestTab(tab) {
  document.getElementById('gtab-call').className = 'tab' + (tab==='call'?' active':'');
  document.getElementById('gtab-menu').className = 'tab' + (tab==='menu'?' active':'');
  document.getElementById('guest-tab-call').style.display = tab==='call' ? 'block' : 'none';
  document.getElementById('guest-tab-menu').style.display = tab==='menu' ? 'block' : 'none';
  if (tab==='menu') renderGuestMenu();
}

let guestMenuActiveGroup = 'all';

async function renderGuestMenu() {
  const area = document.getElementById('guest-menu-content');
  if (!area) return;
  // Load groups + items nếu chưa có
  if (!groups.length || !items.length) {
    area.innerHTML = '<div class="spinner"></div>';
    try {
      const { collection, getDocs, query, orderBy } = window._firebase;
      const [gSnap, iSnap] = await Promise.all([
        getDocs(query(collection(window._db,'groups'), orderBy('order','asc'))),
        getDocs(collection(window._db,'items'))
      ]);
      groups = gSnap.docs.map(d=>({id:d.id,...d.data()}));
      items  = iSnap.docs.map(d=>({id:d.id,...d.data()}));
    } catch(e) {
      area.innerHTML = '<div class="empty">Không tải được menu. Vui lòng thử lại.</div>';
      return;
    }
  }
  if (!groups.length) { area.innerHTML = '<div class="empty">Chưa có menu</div>'; return; }
  guestMenuActiveGroup = 'all';
  renderGuestMenuContent();
}

function renderGuestMenuContent() {
  const area = document.getElementById('guest-menu-content');
  if (!area) return;

  const toppingGroup = groups.find(g=>(g.name||'').toLowerCase()==='topping');
  const displayGroups = groups.filter(g=>(g.name||'').toLowerCase()!=='topping');
  const allGroups = [...displayGroups, ...(toppingGroup ? [toppingGroup] : [])];

  // Tab bar dùng CSS class .tab
  const tabsHtml = `
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none;-webkit-overflow-scrolling:touch">
      <div class="tab ${guestMenuActiveGroup==='all'?'active':''}" onclick="switchGuestMenuGroup('all')" id="gmt-all" style="flex-shrink:0">
        Tất cả
      </div>
      ${allGroups.map(g=>`
        <div class="tab ${guestMenuActiveGroup===g.id?'active':''}" onclick="switchGuestMenuGroup('${g.id}')" id="gmt-${g.id}" style="flex-shrink:0">

// Rate limit: mỗi bàn chỉ gọi được 1 lần/phút
const guestCallTimestamps = {};

async function sendTelegramNotify(message) {

async function doGuestCall(mode) {
  if (!selectedGuestTable) return toast('Chọn bàn trước', 'err');
  const tableId = selectedGuestTable;
  const tableNum = tableId.replace('t','');
  // Rate limit
  const now = Date.now();
  const last = guestCallTimestamps[tableId] || 0;
  const diff = now - last;
  if (diff < 60000) {
    const wait = Math.ceil((60000 - diff) / 1000);
    toast(`⏳ Vui lòng chờ ${wait} giây trước khi gọi lại.`, 'err');
    return;
  }
  guestCallTimestamps[tableId] = now;
  const shopName = shopConfig.name || 'CaféShop';
  try {
    const { collection, addDoc, serverTimestamp } = window._firebase;
    if (mode === 'order') {
      await addDoc(collection(window._db, 'notifications'), {
        type: 'new_guest', tableId, tableNum: parseInt(tableNum), at: serverTimestamp(), read: false
      });
      sendTelegramNotify(`🛎️ <b>${shopName}</b>\nCó khách mới tại <b>Bàn ${tableNum}</b>\nKhách cần gọi món`);
      toast(`✅ Đã gọi nhân viên! Xin vui lòng chờ.`, 'ok');
    } else {
      await addDoc(collection(window._db, 'notifications'), {
        type: 'checkout_request', tableId, tableNum: parseInt(tableNum), at: serverTimestamp(), read: false
      });
      sendTelegramNotify(`💳 <b>${shopName}</b>\nKhách tại <b>Bàn ${tableNum}</b> yêu cầu tính tiền`);
      toast(`✅ Đã yêu cầu tính tiền! Nhân viên sẽ đến ngay.`, 'ok');
    }
    // Reset sau khi gọi
    selectedGuestTable = null;
    document.getElementById('guest-action').style.display = 'none';
    renderGuestTables();
  } catch(e) {
    guestCallTimestamps[tableId] = 0;
    toast('Không thể gọi. Vui lòng gọi trực tiếp nhân viên.', 'err');
  }
}

// ═══════════ LOAD DATA ═══════════
async function loadAllData() {
  const { doc, getDoc, collection, getDocs, query, orderBy } = window._firebase;
  const db = window._db;
  const snap = await getDoc(doc(db, 'config', 'shop'));
  if (snap.exists()) shopConfig = snap.data();
  applyAccent(shopConfig.accent, shopConfig.accent2);

  const [gSnap, iSnap, sSnap] = await Promise.all([
    getDocs(query(collection(db, 'groups'), orderBy('order','asc'))),
    getDocs(collection(db, 'items')),
    getDocs(collection(db, 'staff')),
  ]);
  groups = gSnap.docs.map(d => ({id:d.id,...d.data()}));
  items  = iSnap.docs.map(d => ({id:d.id,...d.data()}));
  staffList = sSnap.docs.map(d => ({id:d.id,...d.data()}));
  subscribeOrders();
  subscribeNotifications();
  subscribeGroupsAndItems(); // Realtime: admin xoá group/món → cập nhật ngay
}

function subscribeGroupsAndItems() {
  const { collection, onSnapshot, query, orderBy } = window._firebase;
  // Lắng nghe groups
  onSnapshot(query(collection(window._db,'groups'), orderBy('order','asc')), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'removed') {
        groups = groups.filter(g => g.id !== ch.doc.id);
      } else if (ch.type === 'added') {
        if (!groups.find(g => g.id === ch.doc.id))
          groups.push({id:ch.doc.id,...ch.doc.data()});
      } else if (ch.type === 'modified') {
        groups = groups.map(g => g.id === ch.doc.id ? {id:ch.doc.id,...ch.doc.data()} : g);
      }
    });
    groups.sort((a,b)=>(a.order||0)-(b.order||0));
  });
  // Lắng nghe items
  onSnapshot(collection(window._db,'items'), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'removed') {
        items = items.filter(i => i.id !== ch.doc.id);
      } else if (ch.type === 'added') {
        if (!items.find(i => i.id === ch.doc.id))
          items.push({id:ch.doc.id,...ch.doc.data()});
      } else if (ch.type === 'modified') {
        items = items.map(i => i.id === ch.doc.id ? {id:ch.doc.id,...ch.doc.data()} : i);
      }
    });
  });
}

function subscribeOrders() {
  if (unsubOrders) unsubOrders();
  const { collection, onSnapshot } = window._firebase;
  unsubOrders = onSnapshot(collection(window._db, 'orders'), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'removed') delete orders[ch.doc.id];
      else orders[ch.doc.id] = {id:ch.doc.id,...ch.doc.data()};
    });
    refreshPOSGrid();
    renderGuestTables();
    if (currentTableId && document.getElementById('order-panel').classList.contains('open')) renderOP(currentTableId);
  });
}

function subscribeNotifications() {
  const { collection, onSnapshot, query, where } = window._firebase;
  onSnapshot(query(collection(window._db,'notifications'), where('read','==',false)), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'added') {
        const d = ch.doc.data();
        if (d.type === 'new_guest') showNotif(`🛎️ Có khách mới tại Bàn ${d.tableNum}`, 'new_guest');
        if (d.type === 'checkout_request') showNotif(`💳 Khách Bàn ${d.tableNum} yêu cầu tính tiền`, 'checkout');
        // Mark read
        const { doc, updateDoc } = window._firebase;
        updateDoc(doc(window._db,'notifications',ch.doc.id), {read:true}).catch(()=>{});
      }
    });
  });
}

// ═══════════ HELPERS ═══════════
// displayName: dùng khắp nơi để hiển thị tên đẹp (tra fullName)
function displayName(emailOrName) {
  if (!emailOrName) return '';
  if (!emailOrName.includes('@')) return emailOrName;
  const s = staffList.find(x => x.email === emailOrName || x.email === emailOrName.toLowerCase());
  if (s && s.fullName) return s.fullName;
  return emailOrName.split('@')[0];
}
// loginName: LUÔN trả về phần trước @ - dùng riêng cho cột "Tên đăng nhập"
function loginName(email) {
  return (email || '').split('@')[0];
}
// myName: tên người đang login
function myName() {
  return currentUserFullName || displayName(currentUser?.email || '');
}
function fmtMoney(n) { return Number(n||0).toLocaleString('vi-VN') + ' ₫'; }
function safeId(s) {
  // Convert any string (including Vietnamese) to a safe HTML id
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return 'h' + Math.abs(h).toString(36);
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('vi-VN');
}
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + (type==='error'?'err':type);
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}
function showNotif(msg, type) {
  // Chỉ hiển thị notif cho nhân viên/admin ĐÃ đăng nhập
  // Khách guest không thấy notif này
  if (isGuest || !currentUser) return;
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `<div class="notif-title">${type==='new_guest'?'🛎️ KHÁCH MỚI':'💳 TÍNH TIỀN'}</div>${msg}`;
  document.getElementById('notif-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 6000);
}
function applyAccent(a, a2) {
  // Backward compat - tìm theme tương ứng và áp dụng
  if (!a) return;
  const theme = THEMES.find(t => t.accent === a) || THEMES[0];
  applyTheme(theme);
}

function applyTheme(t) {
  if (!t) return;
  const r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent2', t.accent2);
  r.setProperty('--bg', t.bg);
  r.setProperty('--surface', t.surface);
  r.setProperty('--surface2', t.surface2);
  r.setProperty('--surface3', t.surface3);
  r.setProperty('--border', t.border);
  r.setProperty('--text', t.text);
  r.setProperty('--text2', t.text2);
  r.setProperty('--text3', t.text3);
  r.setProperty('--cream', t.cream);
}

let pickedAccentIdx = null;
function pickAccent(i, el) {
  document.querySelectorAll('.theme-card').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  pickedAccentIdx = i;
  applyTheme(THEMES[i]);
}

async function saveConfig() {
  const { doc, setDoc } = window._firebase;
  const tc = parseInt(document.getElementById('cfg-tables').value)||20;
  const ai = pickedAccentIdx !== null ? pickedAccentIdx : THEMES.findIndex(a=>a.accent===(shopConfig.accent||THEMES[0].accent));
  const t = THEMES[Math.max(0,ai)];
  shopConfig = {
    name: document.getElementById('cfg-name').value.trim(),
    address: document.getElementById('cfg-addr').value.trim(),
    phone: document.getElementById('cfg-phone').value.trim(),
    footer: document.getElementById('cfg-footer').value.trim(),
    bank: document.getElementById('cfg-bank').value.trim(),
    bankNum: document.getElementById('cfg-banknum').value.trim(),
    bankName: document.getElementById('cfg-bankname').value.trim(),
    tableCount: tc,
    guestEnabled: document.getElementById('cfg-guest').checked,
    accent: t.accent, accent2: t.accent2,
    themeName: t.name,
  };
  await setDoc(doc(window._db,'config','shop'), shopConfig);
  applyTheme(t);
  updateShopUI();
  if (shopConfig.guestEnabled) document.getElementById('guest-login-wrap').style.display='block';
  toast('Đã lưu cấu hình!','ok'); pickedAccentIdx = null;
}

// Toggle quyền quản lý kho (admin bấm checkbox)
async function toggleInvPermission(id, email, newValue, checkbox) {
  if (checkbox) { checkbox.disabled = true; }
  try {
    const { doc, updateDoc } = window._firebase;
    await updateDoc(doc(window._db, 'staff', id), { canInventory: !!newValue });
    // Update cache local
    staffList = staffList.map(s => s.id === id ? { ...s, canInventory: !!newValue } : s);
    toast(newValue
      ? `✅ Đã cấp quyền kho cho ${displayName(email)}`
      : `🚫 Đã thu hồi quyền kho của ${displayName(email)}. Nếu họ đang ở tab Kho sẽ bị đá ra ngay.`,
      newValue ? 'ok' : 'info');
    renderStaffList();
  } catch(e) {
    toast('❌ Lỗi: ' + (e.message||e), 'err');
    if (checkbox) { checkbox.checked = !newValue; checkbox.disabled = false; }
  }
}

// Tạo secondary Firebase app để thao tác Auth mà không ảnh hưởng session admin
async function getSecondaryAuth() {
  const { initializeApp, getAuth } = window._firebase;
  const secApp = initializeApp(window._app.options, 'sec_' + Date.now());
  return getAuth(secApp);
}

// Đổi mật khẩu admin (tự đổi mật khẩu của mình)
async function changeAdminPassword() {
  const oldPwd = document.getElementById('admin-old-pwd').value;
  const newPwd = document.getElementById('admin-new-pwd').value;
  if (!oldPwd || !newPwd) return toast('Nhập đủ mật khẩu hiện tại và mới', 'err');
  if (newPwd.length < 6) return toast('Mật khẩu mới tối thiểu 6 ký tự', 'err');
  if (oldPwd === newPwd) return toast('Mật khẩu mới phải khác mật khẩu cũ', 'err');
  try {
    const { signInWithEmailAndPassword, updatePassword } = window._firebase;
    // Xác thực lại để Firebase cho phép đổi mật khẩu
    const cred = await signInWithEmailAndPassword(window._auth, ADMIN_EMAIL, oldPwd);
    await updatePassword(cred.user, newPwd);
    // Cập nhật pwd lưu trong Firestore (nếu có)
    document.getElementById('admin-old-pwd').value = '';
    document.getElementById('admin-new-pwd').value = '';
    toast('✅ Đổi mật khẩu admin thành công! Lần sau dùng mật khẩu mới.', 'ok');
  } catch(e) {
    const msg = (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
      ? '❌ Mật khẩu hiện tại không đúng!'
      : '❌ Lỗi: ' + (e.message || e);
    toast(msg, 'err');
  }
}

function openAddStaffModal() {
  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>➕ Thêm nhân viên</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="field"><label>Tên đăng nhập</label>
        <div style="position:relative">
          <input class="inp" id="su" placeholder="VD: nguyenvan" autocomplete="off">
          <span class="login-suffix">${DOMAIN}</span>
        </div>
      </div>
      <div class="field"><label>Họ tên</label>
        <input class="inp" id="sfn" placeholder="Nguyễn Văn A">
      </div>
      <div class="field"><label>Mật khẩu</label>
        <input class="inp" type="password" id="sp" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        <button class="btn btn-gold btn-sm" id="add-staff-btn" onclick="addStaff()">✅ Tạo tài khoản</button>
      </div>
    </div>`);
}

async function addStaff() {
  let u = document.getElementById('su').value.trim().toLowerCase();
  const fn = document.getElementById('sfn').value.trim();
  const p = document.getElementById('sp').value;
  if (!u) return toast('Nhập tên đăng nhập', 'err');
  if (p.length < 6) return toast('Mật khẩu tối thiểu 6 ký tự', 'err');
  if (!u.includes('@')) u += DOMAIN;
  if (staffList.find(s => (s.email||'').toLowerCase() === u)) return toast('Tài khoản đã tồn tại', 'err');

  const btn = document.getElementById('add-staff-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Đang tạo...'; }

  try {
    // Bước 1: Tạo user trong Firebase Auth (secondary app)
    const { createUserWithEmailAndPassword } = window._firebase;
    const secAuth = await getSecondaryAuth();
    await createUserWithEmailAndPassword(secAuth, u, p);
    await secAuth.signOut();

    // Bước 2: Lưu vào Firestore staff (bao gồm pwd để dùng khi đổi sau này)
    const { collection, addDoc } = window._firebase;
    const ref = await addDoc(collection(window._db, 'staff'), {
      email: u,
      fullName: fn,
      active: true,
      canInventory: false, // Mặc định KHÔNG có quyền kho. Admin tick sau nếu cần.
      pwd: p, // Lưu để dùng khi admin muốn đổi mật khẩu
      createdAt: new Date().toISOString(),
      createdBy: currentUser.email
    });
    staffList.push({ id: ref.id, email: u, fullName: fn, active: true, canInventory: false, pwd: p });
    closeModal();
    toast(`✅ Đã tạo tài khoản: ${displayName(u)}`, 'ok');
    renderStaffList();
  } catch(e) {
    const msg = e.code === 'auth/email-already-in-use'
      ? 'Tên đăng nhập đã tồn tại trong hệ thống!'
      : (e.message || String(e));
    toast('❌ ' + msg, 'err');
    if (btn) { btn.disabled = false; btn.textContent = '✅ Tạo tài khoản'; }
  }
}

function openEditStaff(id) {
  const s = staffList.find(x => x.id === id);
  if (!s) return;
  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>✏️ Sửa: ${displayName(s.email)}</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="field"><label>Họ tên</label>
        <input class="inp" id="ef" value="${s.fullName || ''}" placeholder="Họ tên">
      </div>
      <div class="field"><label>Mật khẩu mới (để trống nếu không đổi)</label>
        <input class="inp" type="password" id="ep" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        <button class="btn btn-gold btn-sm" id="edit-staff-btn" onclick="saveEditStaff('${id}')">💾 Lưu</button>
      </div>
    </div>`);
}

async function saveEditStaff(id) {
  const fn = document.getElementById('ef').value.trim();
  const np = document.getElementById('ep').value;
  if (np && np.length > 0 && np.length < 6) return toast('Mật khẩu tối thiểu 6 ký tự', 'err');

  const s = staffList.find(x => x.id === id);
  if (!s) return;

  const btn = document.getElementById('edit-staff-btn');

  // Đổi mật khẩu thật trong Firebase Auth
  if (np && np.length >= 6) {
    if (!s.pwd) return toast('Không tìm thấy mật khẩu cũ. Hãy xoá và tạo lại tài khoản.', 'err');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Đang đổi mật khẩu...'; }
    try {
      const { signInWithEmailAndPassword, updatePassword } = window._firebase;
      // Login bằng mật khẩu cũ đang lưu trong Firestore
      const secAuth = await getSecondaryAuth();
      const cred = await signInWithEmailAndPassword(secAuth, s.email, s.pwd);
      // Đổi mật khẩu thật trong Firebase Auth
      await updatePassword(cred.user, np);
      await secAuth.signOut();
      // Cập nhật pwd mới vào Firestore
      const { doc, updateDoc } = window._firebase;
      await updateDoc(doc(window._db, 'staff', id), { fullName: fn, pwd: np });
      if (s) { s.fullName = fn; s.pwd = np; }
      closeModal();
      toast('✅ Đã đổi mật khẩu thành công! Mật khẩu cũ không còn dùng được.', 'ok');
      renderStaffList();
    } catch(e) {
      const msg = (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
        ? 'Mật khẩu cũ lưu trong hệ thống không khớp Firebase Auth. Hãy xoá và tạo lại tài khoản.'
        : (e.message || String(e));
      toast('❌ ' + msg, 'err');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Lưu'; }
    }
  } else {
    // Chỉ đổi họ tên
    const { doc, updateDoc } = window._firebase;
    await updateDoc(doc(window._db, 'staff', id), { fullName: fn });
    if (s) s.fullName = fn;
    closeModal();
    toast('✅ Đã cập nhật họ tên', 'ok');
    renderStaffList();
  }
}

async function deactivateStaff(id, email) {
  if (!confirm(`🚫 Khoá tài khoản "${displayName(email)}"?\nNhân viên này sẽ KHÔNG đăng nhập được nữa.`)) return;
  const emailLower = (email || '').toLowerCase().trim();
  const { doc, updateDoc, getDoc, setDoc } = window._firebase;
  await updateDoc(doc(window._db, 'staff', id), { active: false });
  const disRef = doc(window._db, 'config', 'disabled');
  const snap = await getDoc(disRef);
  // Đọc list cũ và normalize lowercase
  const cur = snap.exists() ? (snap.data().emails || []).map(e=>(e||'').toLowerCase().trim()) : [];
  if (!cur.includes(emailLower)) cur.push(emailLower);
  await setDoc(disRef, { emails: cur });
  staffList = staffList.map(s => s.id === id ? { ...s, active: false } : s);
  toast(`✅ Đã khoá: ${displayName(email)}`, 'ok');
  renderStaffList();
}

async function reactivateStaff(id, email) {
  if (!confirm(`✅ Mở khoá tài khoản "${displayName(email)}"?`)) return;
  const emailLower = (email || '').toLowerCase().trim();
  const { doc, updateDoc, getDoc, setDoc } = window._firebase;
  await updateDoc(doc(window._db, 'staff', id), { active: true });
  const disRef = doc(window._db, 'config', 'disabled');
  const snap = await getDoc(disRef);
  if (snap.exists()) {
    // Lọc bỏ email (so sánh lowercase)
    const cur = (snap.data().emails || []).filter(e => (e||'').toLowerCase().trim() !== emailLower);
    await setDoc(disRef, { emails: cur });
  }
  staffList = staffList.map(s => s.id === id ? { ...s, active: true } : s);
  toast(`✅ Đã mở khoá: ${displayName(email)}`, 'ok');
  renderStaffList();
}

function renderMenuTree() {

    const gItems = items.filter(i=>i.groupId===g.id);

    gItems.forEach(it => {
      if (!byName[it.name]) byName[it.name] = [];
      byName[it.name].push(it);

        <button class="btn btn-ghost btn-xs" style="margin-left:8px" onclick="event.stopPropagation();openEditGroup('${g.id}')">✏️</button>
        <button class="btn btn-red btn-xs" style="margin-left:4px" onclick="event.stopPropagation();deleteGroup('${g.id}')">🗑</button>
      </div>
      <div class="folder-body" id="fg-${g.id}" style="padding:8px 12px">
        ${Object.entries(byName).length ? Object.entries(byName).map(([name, sizes]) => {
          if (sizes.length === 1 && !sizes[0].size) {
            return `<div class="folder-item">
              <span style="font-size:13px;font-weight:500">${name}</span>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="color:var(--accent);font-size:13px">${fmtMoney(sizes[0].price)}</span>
                <button class="btn btn-ghost btn-xs" onclick="openEditItem('${sizes[0].id}')">✏️</button>
                <button class="btn btn-red btn-xs" onclick="deleteItem('${sizes[0].id}')">🗑</button>
              </div>
            </div>`;
          }
          return `<div class="sub-folder">
            <div class="sub-folder-head" onclick="toggleFolder('sf-${g.id}-${safeId(name)}',this)">
              <span class="folder-arrow" id="fa-sf-${g.id}-${safeId(name)}">▶</span>
              📦 ${name}
              <span class="tag tag-blue" style="margin-left:auto">${sizes.length} size</span>
            </div>
            <div class="sub-folder-body" id="sf-${g.id}-${safeId(name)}">
              ${sizes.map(s=>`<div class="folder-item" style="margin-bottom:4px">
                <span style="font-size:12px">${s.size||'Mặc định'}</span>

                </div>
              </div>`).join('')}

          </div>`;
        }).join('') : '<div class="empty" style="padding:12px">Chưa có món trong nhóm này</div>'}
      </div>
    </div>`;
  }).join('');
}

function toggleFolder(id, headEl) {
