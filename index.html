// ═══════════ POS ═══════════
let posFilter = 'all';

function countByFilter(filter) {
  const tc = shopConfig.tableCount || 20;
  let count = 0;
  for (let i = 1; i <= tc; i++) {
    const ord = orders['t'+i];
    const tick = getTableTickStatus(ord);
    if (filter === 'all') count++;
    else if (filter === 'occupied' && ord && tick !== null) count++;
    else if (filter === 'some'     && tick === 'some') count++;
    else if (filter === 'all-done' && tick === 'all') count++;
    else if (filter === 'empty'    && !ord) count++;
  }
  return count;
}

function renderPOS() {
  document.getElementById('main').innerHTML = `
    <div class="ph">
      <div><h2 class="ph-title">🧾 Bán hàng</h2></div>
    </div>
    <div id="pos-tabs-wrap"></div>
    <div class="pos-grid" id="pos-grid"></div>`;
  renderPosTabs();
  refreshPOSGrid();
}

function renderPosTabs() {
  const wrap = document.getElementById('pos-tabs-wrap');
  if (!wrap) return;
  const tabs = [
    { key:'all',      label:'Tất cả' },
    { key:'occupied', label:'🟢 Có khách' },
    { key:'some',     label:'🟡 Đang làm' },
    { key:'all-done', label:'🔵 Xong' },
    { key:'empty',    label:'⬜ Trống' },
  ];
  wrap.innerHTML = `<div class="tabs" id="pos-tabs" style="margin-bottom:14px">
    ${tabs.map(t => {
      const cnt = countByFilter(t.key);
      return `<div class="tab ${t.key===posFilter?'active':''}" onclick="setPosFilter('${t.key}',this)">
        ${t.label} <span style="margin-left:4px;background:${t.key===posFilter?'rgba(0,0,0,.2)':'var(--surface2)'};border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700">${cnt}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function setPosFilter(filter, el) {
  posFilter = filter;
  renderPosTabs();
  refreshPOSGrid();
}

function getTableTickStatus(ord) {
  if (!ord || !ord.items || !ord.items.length) return null;
  const merged = mergeOrderItems(ord.items);
  let totalUnits = 0, doneUnits = 0;
  merged.forEach(it => {
    const qty = it.qty || 1;
    totalUnits += qty;
    doneUnits += Math.min(it.doneCount || 0, qty);
  });
  if (doneUnits === 0) return 'none';
  if (doneUnits >= totalUnits) return 'all';
  return 'some';
}

function refreshPOSGrid() {
  renderPosTabs(); // Cập nhật số đếm realtime
  const grid = document.getElementById('pos-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const tc = shopConfig.tableCount || 20;
  let shown = 0;
  for (let i = 1; i <= tc; i++) {
    const id = 't'+i;
    const ord = orders[id];
    const tickStatus = getTableTickStatus(ord); // null=trống, 'none'=có khách chưa tick, 'some'=đang làm, 'all'=xong

    // Lọc theo tab
    if (posFilter === 'occupied' && (!ord || tickStatus === null)) continue;
    if (posFilter === 'some'     && tickStatus !== 'some') continue;
    if (posFilter === 'all-done' && tickStatus !== 'all') continue;
    if (posFilter === 'empty'    && ord) continue;

    shown++;
    let borderColor = '';
    let extraClass = '';
    if (ord) {
      if (tickStatus === 'all')  { extraClass = ' occupied'; borderColor = 'border-color:var(--blue);background:#0a1525'; }
      else if (tickStatus === 'some') { extraClass = ' occupied'; borderColor = 'border-color:var(--accent);background:#1a1500'; }
      else { extraClass = ' occupied'; borderColor = ''; }
    }
    const card = document.createElement('div');
    card.className = 't-card' + extraClass + (id===currentTableId?' selected':'');
    card.style.cssText = borderColor;
    card.draggable = true;
    card.dataset.id = id;
    const tickBadge = tickStatus === 'all'
      ? `<div style="position:absolute;top:6px;right:6px;background:var(--blue);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700">✓ Xong</div>`
      : tickStatus === 'some'
      ? `<div style="position:absolute;top:6px;right:6px;background:var(--accent);color:#1a1000;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700">⏳</div>`
      : '';
    card.innerHTML = `
      ${tickBadge}
      <div class="tnum">${i}</div>
      <div class="tstatus">${ord?'Có khách':'Trống'}</div>
      ${ord?`<div class="tamount">${fmtMoney(calcTotal(ord))}</div>
             <div class="tstaff">${displayName(ord.staffEmail||'')}</div>`:''}`;
    card.onclick = () => selectTable(id);
    card.addEventListener('dragstart', e=>e.dataTransfer.setData('text',id));
    card.addEventListener('dragover', e=>{e.preventDefault();card.style.outline='2px dashed var(--accent2)'});
    card.addEventListener('dragleave', ()=>card.style.outline='');
    card.addEventListener('drop', e=>{
      e.preventDefault(); card.style.outline='';
      const from = e.dataTransfer.getData('text');
      if (from && from!==id) confirmMerge(from, id);
    });
    grid.appendChild(card);
  }
  if (shown === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Không có bàn nào</div>';
  }
}

function selectTable(id) {
  currentTableId = id;
  refreshPOSGrid();
  openOP(id);
}

// ═══════════ ORDER PANEL ═══════════
function openOP(tableId) {
  currentTableId = tableId;
  document.getElementById('order-panel').classList.add('open');
  renderOP(tableId);
}
function closeOP() {
  // Cảnh báo nếu có thay đổi +/- chưa lưu
  if (currentTableId && localQtyChanges[currentTableId] && Object.keys(localQtyChanges[currentTableId]).length > 0) {
    if (!confirm('⚠️ Bạn có thay đổi số lượng chưa lưu!\n\nThoát sẽ mất thay đổi. Tiếp tục?')) return;
    delete localQtyChanges[currentTableId];
  }
  document.getElementById('order-panel').classList.remove('open');
  currentTableId = null;
  refreshPOSGrid();
}

function renderOP(tableId) {
  const num = tableId.replace('t','');
  const ord = orders[tableId];
  document.getElementById('op-title').textContent = `🪑 Bàn ${num}`;
  document.getElementById('op-meta').textContent = ord&&ord.mergeLog&&ord.mergeLog.length
    ? `(gộp từ: ${[...new Set((ord.mergeLog||[]).filter(l=>l.action==='merge'||l.action==='drag-merge').map(l=>l.fromTableNum))].join(', ')})`
    : '';
  const body = document.getElementById('op-body');
  if (!ord||!ord.items||!ord.items.length) {
    body.innerHTML = '<div class="empty">Chưa có món nào<br>Nhấn "+ Thêm món"</div>';
    document.getElementById('op-total').textContent = '0 ₫';
    renderSaveBtn(tableId);
    return;
  }

  const merged = mergeOrderItems(ord.items);
  const local = localQtyChanges[tableId] || {};

  body.innerHTML = merged.map((it,idx)=>{
    const key = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
    const displayQty = key in local ? local[key] : it.qty;
    const changed = key in local && local[key] !== it.qty;
    const doneCount = it.doneCount || 0; // Số ly/phần đã xong
    const allDone = doneCount >= displayQty;
    const someDone = doneCount > 0 && !allDone;

    // Vẽ từng chấm tròn cho mỗi ly
    const circles = Array.from({length: displayQty}, (_,i) => {
      const isDone = i < doneCount;
      return `<button onclick="tickUnit('${tableId}','${key}',${i})" title="${isDone?'Bỏ tick':'Tick xong'}"
        style="width:26px;height:26px;border-radius:50%;border:2px solid ${isDone?'var(--green)':'var(--border)'};
        background:${isDone?'var(--green)':'transparent'};color:#fff;font-size:13px;cursor:pointer;
        display:inline-flex;align-items:center;justify-content:center;transition:all .2s;margin:1px">
        ${isDone?'✓':''}
      </button>`;
    }).join('');

    return `
    <div class="oi" style="${changed?'background:rgba(201,168,76,.08);border:1px solid var(--accent)':allDone?'background:rgba(90,171,122,.08);border:1px solid var(--green)':someDone?'background:rgba(201,168,76,.05);border:1px solid var(--accent)':''}">
      <div class="oi-info">
        <div class="oi-name" style="${allDone?'text-decoration:line-through;opacity:.6':''}">${it.name}${displayQty>1?`<span class="qty-badge">×${displayQty}</span>`:''}</div>
        <div class="oi-meta">
          ${it.size?`📏${it.size} `:''}
          ${(it.toppings||[]).length?'🫧'+it.toppings.join(','):''}
          ${it.orderByName?`👤${it.orderByName}`:it.orderBy?`👤${displayName(it.orderBy)}`:''}
        </div>
        <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:2px">${circles}</div>
      </div>
      <div class="oi-right">
        <div class="oi-price">${fmtMoney(it.price*displayQty)}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQtyLocal('${tableId}',${idx},-1)">−</button>
          <span class="qty-num" ${changed?'style="color:var(--accent);font-weight:800"':''}>${displayQty}</span>
          <button class="qty-btn" onclick="changeQtyLocal('${tableId}',${idx},1)">+</button>
        </div>
        <button class="btn btn-red btn-xs" onclick="removeItem('${tableId}',${idx})">✕</button>
      </div>
    </div>`;
  }).join('');

  // Tính tổng từ local
  const totalLocal = merged.reduce((s,it)=>{
    const key = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
    const qty = key in local ? local[key] : it.qty;
    return s + it.price * qty;
  }, 0);
  document.getElementById('op-total').textContent = fmtMoney(totalLocal);
  renderSaveBtn(tableId);
}

function renderSaveBtn(tableId) {
  const local = localQtyChanges[tableId] || {};
  const hasChanges = Object.keys(local).length > 0;
  // Thêm/xoá nút lưu trong op-actions
  const existing = document.getElementById('op-save-btn');
  if (hasChanges && !existing) {
    const actions = document.querySelector('.op-actions');
    if (!actions) return;
    const btn = document.createElement('button');
    btn.id = 'op-save-btn';
    btn.className = 'btn btn-gold btn-sm';
    btn.style = 'flex:1';
    btn.textContent = '✅ Lưu thay đổi';
    btn.onclick = () => saveQtyChanges(tableId);
    actions.insertBefore(btn, actions.children[1]);
  } else if (!hasChanges && existing) {
    existing.remove();
  }
}

function mergeOrderItems(itemsArr) {
  const map = {};
  itemsArr.forEach(it => {
    const key = [it.name, it.size||'', (it.toppings||[]).sort().join('|')].join('__');
    if (!map[key]) {
      map[key] = {...it, qty: it.qty||1, doneCount: it.doneCount||0};
    } else {
      map[key].qty += (it.qty||1);
      map[key].doneCount = (map[key].doneCount||0) + (it.doneCount||0);
    }
  });
  return Object.values(map);
}

// Chỉ thay đổi local, CHƯA ghi Firebase
function changeQtyLocal(tableId, idx, delta) {
  const ord = orders[tableId]; if (!ord) return;
  const merged = mergeOrderItems(ord.items);
  const target = merged[idx]; if (!target) return;
  const key = [target.name, target.size||'', (target.toppings||[]).slice().sort().join('|')].join('__');
  const local = localQtyChanges[tableId] || {};
  const currentQty = key in local ? local[key] : target.qty;
  const newQty = Math.max(1, currentQty + delta);
  local[key] = newQty;
  localQtyChanges[tableId] = local;
  renderOP(tableId); // Re-render local
}

// Bấm "✅ Lưu thay đổi" → ghi Firebase + gửi Telegram
async function saveQtyChanges(tableId) {
  const ord = orders[tableId]; if (!ord) return;
  const local = localQtyChanges[tableId] || {};
  if (!Object.keys(local).length) return;
  const merged = mergeOrderItems(ord.items);
  const logs = [];
  const changed = []; // Để gửi Telegram

  merged.forEach(target => {
    const key = [target.name, target.size||'', (target.toppings||[]).slice().sort().join('|')].join('__');
    if (!(key in local)) return;
    const newQty = local[key];
    const oldQty = target.qty;
    if (newQty === oldQty) return;
    const same = [], others = [];
    ord.items.forEach(it => {
      const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
      if (k===key) same.push(it); else others.push(it);
    });
    if (same.length) {
      const newQtyFinal = local[key];
      const oldQtyFinal = target.qty;
      const currentDone = same[0].doneCount || 0;
      // Giữ nguyên doneCount, cập nhật done theo qty mới
      ord.items = [...others, {...same[0], qty: newQtyFinal, doneCount: currentDone, done: currentDone >= newQtyFinal}];
      logs.push(`Đổi SL: ${target.name}${target.size?' ('+target.size+')':''} ${oldQty} → ${newQty}`);
      changed.push({ name: target.name, size: target.size, oldQty, newQty, price: target.price });
    }
  });

  delete localQtyChanges[tableId];
  await saveOrder(tableId, ord);
  for (const log of logs) await logHistory(tableId, log);

  // Gửi Telegram nếu có thay đổi
  if (changed.length) {
    const shopName = shopConfig.name || 'CaféShop';
    const tableNum = tableId.replace('t','');
    const lines = changed.map(it =>
      `• ${it.name}${it.size?' ('+it.size+')':''}: ${it.oldQty} → ${it.newQty} — ${fmtMoney(it.price*it.newQty)}`
    ).join('\n');
    sendTelegramNotify(`✏️ <b>${shopName} - Bàn ${tableNum}</b> cập nhật SL\n${lines}\n👤 ${myName()}`);
  }

  toast('✅ Đã lưu thay đổi', 'ok');
}

// Tick từng ly/phần riêng lẻ
// unitIdx: index của ly (0,1,2...) - bấm ly đã tick → bỏ tick ly đó và các ly sau
async function tickUnit(tableId, key, unitIdx) {
  const ord = orders[tableId]; if (!ord||!ord.items) return;
  ord.items = ord.items.map(it => {
    const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
    if (k !== key) return it;
    const currentDone = it.doneCount || 0;
    let newDone;
    if (unitIdx < currentDone) {
      // Bấm ly đã tick → bỏ tick từ ly đó trở đi
      newDone = unitIdx;
    } else {
      // Bấm ly chưa tick → tick đến ly đó
      newDone = unitIdx + 1;
    }
    return {...it, doneCount: newDone, done: newDone >= (it.qty||1)};
  });
  await saveOrder(tableId, ord);
}

async function changeQty(tableId, idx, delta) {
  // Giữ lại hàm cũ nhưng redirect sang local
  changeQtyLocal(tableId, idx, delta);
}

async function removeItem(tableId, idx) {
  const ord = orders[tableId]; if (!ord) return;
  const merged = mergeOrderItems(ord.items);
  const target = merged[idx];
  if (!target) return;

  const isLast = merged.length === 1; // Đây là món cuối cùng
  const confirmMsg = isLast
    ? `Xoá món cuối "${target.name}${target.size?' ('+target.size+')':''}"?\n\n⚠️ Bàn sẽ được dọn sạch và trả về trống.`
    : `Xoá món "${target.name}${target.size?' ('+target.size+')':''}" × ${target.qty}?`;

  if (!confirm(confirmMsg)) return;

  // Nếu là món cuối → xoá luôn order (dọn bàn)
  if (isLast) {
    if (!confirm('Xác nhận lần 2: Dọn sạch bàn này?')) return;
    const { doc, deleteDoc } = window._firebase;
    await logHistory(tableId, `Xoá món cuối: ${target.name} → Dọn bàn`);
    await deleteDoc(doc(window._db, 'orders', tableId));
    delete localQtyChanges[tableId];
    closeOP();
    toast(`✅ Đã dọn sạch Bàn ${tableId.replace('t','')}`, 'ok');
    return;
  }

  // Xoá bình thường
  const tkey = [target.name, target.size||'', (target.toppings||[]).slice().sort().join('|')].join('__');
  await logHistory(tableId, `Xoá món: ${target.name}${target.size?' ('+target.size+')':''} × ${target.qty}`);
  ord.items = ord.items.filter(it => {
    const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
    return k !== tkey;
  });
  await saveOrder(tableId, ord);
  toast(`Đã xoá: ${target.name}`, 'ok');
}

async function saveOrder(tableId, ordData) {
  const { doc, setDoc, serverTimestamp } = window._firebase;
  // Tạo sessionId mới nếu order chưa có (bàn trống trước đó)
  const sessionId = ordData.sessionId || `${tableId}_${Date.now()}`;
  const data = {
    tableId,
    sessionId,
    items: ordData.items||[],
    staffEmail: ordData.staffEmail||currentUser?.email||'',
    staffName: ordData.staffName||myName(),
    mergeLog: ordData.mergeLog||[],
    createdAt: ordData.createdAt||serverTimestamp(),
    updatedAt: serverTimestamp()
  };
  await setDoc(doc(window._db,'orders',tableId), data);
  return sessionId;
}

function calcTotal(ord) {
  if (!ord||!ord.items) return 0;
  return ord.items.reduce((s,it)=>s+(it.price*(it.qty||1)),0);
}

// ═══════════ MENU MODAL (POS) ═══════════
// ═══════════ MENU MODAL - giỏ tạm, xác nhận mới save ═══════════
let cartDraft = []; // Giỏ tạm trong modal, chưa commit Firebase

function openMenuModal() {
  if (!currentTableId) return;
  selectedToppings = [];
  cartDraft = []; // reset giỏ mỗi lần mở
  const toppingGroup = groups.find(g=>g.name&&g.name.toLowerCase()==='topping');
  const nonToppingGroups = groups.filter(g=>!g.name||g.name.toLowerCase()!=='topping');
  const toppings = toppingGroup ? items.filter(i=>i.groupId===toppingGroup.id) : [];
  if (!nonToppingGroups.length) return toast('Chưa có món nào. Vào Quản lý món thêm trước.','err');

  openModal(`
    <div class="modal modal-lg" onclick="event.stopPropagation()" style="display:flex;flex-direction:column;max-height:90vh">
      <div class="modal-title" style="flex-shrink:0"><h3>Chọn món – Bàn ${currentTableId.replace('t','')}</h3><button class="modal-close" onclick="cancelMenuModal()">✕</button></div>
      <div class="tabs" id="menu-modal-tabs" style="flex-shrink:0;overflow-x:auto;flex-wrap:nowrap;display:flex">
        <div class="tab active" onclick="switchMenuGroup('all',this)">Tất cả</div>
        ${nonToppingGroups.map(g=>`<div class="tab" onclick="switchMenuGroup('${g.id}',this)">${g.name}</div>`).join('')}
      </div>
      <div style="flex:1;overflow-y:auto;margin-bottom:10px">
        <div id="menu-modal-items"></div>
        ${toppings.length?`
          <div style="margin-top:14px">
            <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">🫧 Topping (chọn kèm món kế tiếp)</div>
            <div class="topping-wrap" id="topping-wrap">
              ${toppings.map(t=>`<div class="tchip" onclick="toggleTopping('${t.id}','${t.name}',${t.price},this)">${t.name} <span style="color:var(--accent)">${fmtMoney(t.price)}</span></div>`).join('')}
            </div>
          </div>`:''}
      </div>
      <!-- CART DRAFT -->
      <div style="flex-shrink:0;border-top:2px solid var(--accent);padding-top:12px;background:var(--surface)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:13px;font-weight:700;color:var(--cream)">🛒 Đã chọn (<span id="cart-count">0</span>)</div>
          <div style="font-size:14px;font-weight:700;color:var(--accent2)" id="cart-total">0 ₫</div>
        </div>
        <div id="cart-draft-list" style="max-height:140px;overflow-y:auto;margin-bottom:10px"></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" style="flex:1" onclick="cancelMenuModal()">Hủy</button>
          <button class="btn btn-gold btn-sm" style="flex:2" onclick="confirmCartDraft()">✅ Xác nhận thêm</button>
        </div>
      </div>
    </div>`);
  switchMenuGroup('all', null);
  renderCartDraft();
}

function cancelMenuModal() {
  if (cartDraft.length > 0) {
    if (!confirm(`Bạn có ${cartDraft.length} món chưa xác nhận. Huỷ và bỏ hết?`)) return;
  }
  cartDraft = [];
  selectedToppings = [];
  closeModal();
}

function switchMenuGroup(gid, tabEl) {
  if (tabEl) {
    document.querySelectorAll('#menu-modal-tabs .tab').forEach(t=>t.classList.remove('active'));
    tabEl.classList.add('active');
  }
  const toppingGroupId = groups.find(g=>g.name&&g.name.toLowerCase()==='topping')?.id;
  // Nếu gid = 'all' → lấy tất cả món không phải topping
  const gItems = gid === 'all'
    ? items.filter(i => i.groupId !== toppingGroupId)
    : items.filter(i => i.groupId === gid);

  const area = document.getElementById('menu-modal-items');
  if (!area) return;
  if (!gItems.length) { area.innerHTML='<div class="empty">Chưa có món</div>'; return; }

  // Nhóm theo tên (để hiển thị size)
  const byName = {};
  gItems.forEach(it=>{ if (!byName[it.name]) byName[it.name]=[]; byName[it.name].push(it); });

  area.innerHTML = `<div class="menu-grid">
    ${Object.entries(byName).map(([name, sizes])=>{
      // Lấy groupId của item này (dùng cho size picker)
      const itemGid = sizes[0].groupId;
      if (sizes.length===1) {
        const it = sizes[0];
        return `<div class="mi" onclick="handleMenuItemClick('${it.id}')">
          <div class="mi-name">${name}</div>
          ${it.size?`<div class="mi-size">${it.size}</div>`:''}
          <div class="mi-price">${fmtMoney(it.price)}</div>
        </div>`;
      }
      return `<div class="mi" onclick="openSizePickerByName('${itemGid}','${safeId(name)}','${encodeURIComponent(name)}')">
        <div class="mi-name">${name}</div>
        <div class="mi-size">${sizes.length} sizes</div>
        <div class="mi-price">${fmtMoney(Math.min(...sizes.map(s=>s.price)))}+</div>
      </div>`;
    }).join('')}
  </div>`;
}

function openSizePickerByName(groupId, idHash, encodedName) {
  const name = decodeURIComponent(encodedName);
  const sizes = items.filter(i => i.groupId === groupId && i.name === name);
  if (!sizes.length) return;
  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>Chọn size: ${escapeHTML(name)}</h3><button class="modal-close" onclick="backToMenuModal()">← Quay lại</button></div>
      <div class="size-grid">
        ${sizes.map(s=>`<div class="size-opt" onclick="handleSizePick('${s.id}')">
          <div class="s-name">${s.size||'Mặc định'}</div>
          <div class="s-price">${fmtMoney(s.price)}</div>
        </div>`).join('')}
      </div>
    </div>`);
}

function backToMenuModal() {
  // Mở lại modal menu với giỏ tạm còn nguyên
  const savedCart = [...cartDraft];
  const savedToppings = [...selectedToppings];
  closeModal();
  openMenuModalPreserve(savedCart, savedToppings);
}

function openMenuModalPreserve(savedCart, savedToppings) {
  openMenuModal();
  cartDraft = savedCart;
  selectedToppings = savedToppings;
  // Restore topping UI
  setTimeout(() => {
    selectedToppings.forEach(t => {
      document.querySelectorAll('.tchip').forEach(el => {
        if (el.textContent.startsWith(t.name)) el.classList.add('sel');
      });
    });
    renderCartDraft();
  }, 50);
}

function handleSizePick(itemId) {
  handleMenuItemClick(itemId);
  // Quay lại modal menu
  backToMenuModal();
}

function handleMenuItemClick(itemId) {
  addToCartDraft(itemId);
}

function toggleTopping(id, name, price, el) {
  el.classList.toggle('sel');
  if (el.classList.contains('sel')) selectedToppings.push({id, name, price});
  else selectedToppings = selectedToppings.filter(t=>t.id!==id);
}

// Thêm vào giỏ tạm (KHÔNG ghi Firebase)
function addToCartDraft(itemId) {
  const item = items.find(i=>i.id===itemId);
  if (!item) return;
  const toppingCost = selectedToppings.reduce((s,t)=>s+t.price, 0);
  const toppingNames = selectedToppings.map(t=>t.name);

  const newKey = [item.name, item.size||'', [...toppingNames].sort().join('|')].join('__');
  const existing = cartDraft.find(it => {
    const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
    return k === newKey;
  });

  if (existing) {
    existing.qty = (existing.qty||1) + 1;
  } else {
    cartDraft.push({
      itemId, name:item.name, size:item.size||'',
      price: item.price + toppingCost, basePrice: item.price,
      toppings: toppingNames, qty: 1,
    });
  }

  // Reset topping sau khi thêm món
  selectedToppings = [];
  document.querySelectorAll('.tchip.sel').forEach(el=>el.classList.remove('sel'));
  renderCartDraft();
  // Flash cart
  const card = document.getElementById('cart-count');
  if (card) { card.style.transform='scale(1.3)'; setTimeout(()=>card.style.transform='',200); }
}

function renderCartDraft() {
  const list = document.getElementById('cart-draft-list');
  const countEl = document.getElementById('cart-count');
  const totalEl = document.getElementById('cart-total');
  if (!list) return;
  if (!cartDraft.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:12px;font-size:12px">Chọn món để thêm vào giỏ...</div>';
    if (countEl) countEl.textContent = '0';
    if (totalEl) totalEl.textContent = '0 ₫';
    return;
  }
  list.innerHTML = cartDraft.map((it,idx)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface2);border-radius:7px;margin-bottom:4px;font-size:12px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600">${escapeHTML(it.name)}${it.size?' ('+escapeHTML(it.size)+')':''}</div>
        ${it.toppings&&it.toppings.length?`<div style="font-size:10px;color:var(--text3)">+ ${it.toppings.join(', ')}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="qty-btn" style="width:22px;height:22px;font-size:13px" onclick="draftChangeQty(${idx},-1)">−</button>
        <span style="min-width:18px;text-align:center;font-weight:700">${it.qty}</span>
        <button class="qty-btn" style="width:22px;height:22px;font-size:13px" onclick="draftChangeQty(${idx},1)">+</button>
      </div>
      <div style="color:var(--accent);font-weight:600;min-width:65px;text-align:right">${fmtMoney(it.price*it.qty)}</div>
      <button class="btn btn-red btn-xs" style="padding:2px 6px" onclick="draftRemove(${idx})">✕</button>
    </div>
  `).join('');
  const total = cartDraft.reduce((s,it)=>s+it.price*it.qty, 0);
  const count = cartDraft.reduce((s,it)=>s+it.qty, 0);
  if (countEl) countEl.textContent = count;
  if (totalEl) totalEl.textContent = fmtMoney(total);
}

function draftChangeQty(idx, delta) {
  if (!cartDraft[idx]) return;
  cartDraft[idx].qty = Math.max(1, cartDraft[idx].qty + delta);
  renderCartDraft();
}

function draftRemove(idx) {
  cartDraft.splice(idx, 1);
  renderCartDraft();
}

// XÁC NHẬN - giờ mới ghi Firebase
async function confirmCartDraft() {
  if (!cartDraft.length) return toast('Chưa chọn món nào','err');
  const tableId = currentTableId;
  const ord = orders[tableId] || { tableId, items:[], staffEmail:currentUser.email, staffName:myName(), mergeLog:[] };
  ord.items = ord.items || [];

  // Merge cartDraft vào ord.items
  for (const cartItem of cartDraft) {
    const cartKey = [cartItem.name, cartItem.size||'', (cartItem.toppings||[]).slice().sort().join('|')].join('__');
    const existing = ord.items.find(it => {
      const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
      return k === cartKey;
    });
    if (existing) {
      existing.qty = (existing.qty||1) + cartItem.qty;
      existing.doneCount = existing.doneCount || 0; // Giữ số đã xong, không reset
      existing.done = existing.doneCount >= existing.qty;
    } else {
      ord.items.push({ ...cartItem, orderBy:currentUser.email, orderByName:myName(), addedAt:new Date().toISOString() });
    }
  }

  // Check isNewOrder TRƯỚC khi save (bàn chưa có order = lần đầu)
  const tableNum = tableId.replace('t','');
  const shopName = shopConfig.name || 'CaféShop';
  const isNewOrder = !orders[tableId] || !(orders[tableId].items||[]).length;

  const sessionId = await saveOrder(tableId, ord);

  // Log từng món
  for (const it of cartDraft) {
    await logHistory(tableId, `Thêm: ${it.name}${it.size?' ('+it.size+')':''}${it.toppings&&it.toppings.length?' + '+it.toppings.join(','):''} × ${it.qty}`, sessionId);
  }

  // Gửi Telegram
  const header = isNewOrder
    ? `🆕 <b>${shopName} - Bàn ${tableNum}</b> có order mới`
    : `➕ <b>${shopName} - Bàn ${tableNum}</b> gọi thêm`;
  const lines = cartDraft.map(it =>
    `• ${it.name}${it.size?' ('+it.size+')':''}${it.toppings&&it.toppings.length?' + '+it.toppings.join(','):''} × ${it.qty} — ${fmtMoney(it.price*it.qty)}`
  ).join('\n');
  const total = cartDraft.reduce((s,it)=>s+it.price*it.qty, 0);
  sendTelegramNotify(`${header}\n${lines}\n<b>Tổng: ${fmtMoney(total)}</b>\n👤 ${myName()}`);

  toast(`✅ Đã thêm ${cartDraft.reduce((s,it)=>s+it.qty,0)} món vào Bàn ${tableNum}`, 'ok');
  cartDraft = [];
  selectedToppings = [];
  closeModal();
}

// Giữ hàm addToOrder cũ cho tương thích (không dùng nữa)
async function addToOrder(itemId) {
  addToCartDraft(itemId);
}

function openMergeModal() {
  if (!currentTableId) return;
  const masterNum = currentTableId.replace('t','');
  const tc = shopConfig.tableCount||20;
  const tables = [];
  for (let i=1;i<=tc;i++) tables.push('t'+i);

      <p style="font-size:13px;color:var(--text2);margin-bottom:4px">Chọn bàn muốn gộp vào <strong style="color:var(--accent)">Bàn ${masterNum}</strong>. Toàn bộ món chuyển sang, bàn kia sẽ trống.</p>
      <p style="font-size:11px;color:var(--text3);margin-bottom:14px">🟢 = đang có khách</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
        ${tables.filter(id=>id!==currentTableId).map(id=>{
          const num=id.replace('t','');
          const has=!!orders[id];
          // KHÔNG tự chọn sẵn - để trống, nhân viên tự chọn
          return `<div class="tchip" id="ms-${id}" onclick="this.classList.toggle('sel')" style="${has?'border-color:var(--green);color:var(--green)':''}">Bàn ${num}${has?' 🟢':''}</div>`;
        }).join('')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        <button class="btn btn-gold btn-sm" onclick="doMerge()">✅ Gộp bàn</button>
      </div>
    </div>`);
}

async function doMerge() {
  const selected = Array.from(document.querySelectorAll('[id^="ms-"].sel')).map(el=>el.id.replace('ms-',''));
  if (!selected.length) return toast('⚠️ Chưa chọn bàn nào!','err');

  const masterNum = currentTableId.replace('t','');
  const names = selected.map(id=>'Bàn '+id.replace('t','')).join(', ');

  // Confirm trước khi gộp
  if (!confirm(`Xác nhận gộp ${names} → Bàn ${masterNum}?\n\nToàn bộ món của ${names} sẽ chuyển sang Bàn ${masterNum}.\nCác bàn kia sẽ được giải phóng.`)) return;

  const { doc, deleteDoc } = window._firebase;
  const master = orders[currentTableId]||{tableId:currentTableId,items:[],staffEmail:currentUser.email,staffName:myName(),mergeLog:[]};
  master.items = master.items||[]; master.mergeLog = master.mergeLog||[];

  for (const sid of selected) {
    const slave = orders[sid];
    if (slave&&slave.items) {
      master.items.push(...slave.items.map(it=>({...it, fromTable:sid, fromTableNum:sid.replace('t','')})));
    }
    master.mergeLog.push({action:'merge', fromTable:sid, fromTableNum:sid.replace('t',''), by:currentUser.email, at:new Date().toISOString()});
    try { await deleteDoc(doc(window._db,'orders',sid)); } catch(e){}
    await logHistory(sid, `Gộp vào Bàn ${masterNum} bởi ${myName()}`);
  }
  await saveOrder(currentTableId, master);
  await logHistory(currentTableId, `Gộp ${names} vào bởi ${myName()}`);
  toast(`✅ Đã gộp ${names} → Bàn ${masterNum}`, 'ok');
  closeModal(); renderOP(currentTableId);
}

async function confirmMerge(fromId, toId) {
  if (!confirm(`Gộp Bàn ${fromId.replace('t','')} → Bàn ${toId.replace('t','')}?\nToàn bộ món chuyển sang, Bàn ${fromId.replace('t','')} sẽ trống.`)) return;
  const { doc, deleteDoc } = window._firebase;
  const master = orders[toId]||{tableId:toId,items:[],staffEmail:currentUser.email,staffName:myName(),mergeLog:[]};
  master.items = master.items||[]; master.mergeLog = master.mergeLog||[];
  const slave = orders[fromId];
  if (slave&&slave.items) master.items.push(...slave.items.map(it=>({...it, fromTable:fromId, fromTableNum:fromId.replace('t','')})));
  master.mergeLog.push({action:'drag-merge', fromTable:fromId, fromTableNum:fromId.replace('t',''), by:currentUser.email, at:new Date().toISOString()});
  try { await deleteDoc(doc(window._db,'orders',fromId)); } catch(e){}
  await saveOrder(toId, master);
  await logHistory(fromId, `Gộp vào Bàn ${toId.replace('t','')} (kéo thả) bởi ${myName()}`);
  await logHistory(toId, `Nhận gộp từ Bàn ${fromId.replace('t','')} bởi ${myName()}`);
  toast(`✅ Gộp Bàn ${fromId.replace('t','')} → Bàn ${toId.replace('t','')}`, 'ok');
  if (currentTableId===toId) renderOP(toId);
}

// ═══════════ CHECKOUT ═══════════
function openCheckout() {
  if (!currentTableId) return;
  const ord = orders[currentTableId];
  if (!ord||!ord.items||!ord.items.length) return toast('Chưa có món','err');

  // Chặn nếu có thay đổi số lượng chưa lưu
  const local = localQtyChanges[currentTableId] || {};
  if (Object.keys(local).length > 0) {
    alert('⚠️ Bạn có thay đổi số lượng CHƯA LƯU!\n\nHãy bấm "✅ Lưu thay đổi" trước khi tính tiền.');
    return;
  }

  const merged = mergeOrderItems(ord.items);

  // Chặn nếu còn món chưa làm xong
  const notDone = merged.filter(it => (it.doneCount||0) < (it.qty||1));
  if (notDone.length > 0) {
    const names = notDone.map(it=>`• ${it.name}${it.size?' ('+it.size+')':''}: ${it.doneCount||0}/${it.qty||1}`).join('\n');
    alert(`⚠️ Còn món chưa làm xong:\n${names}\n\nHãy tick đủ hoặc xoá món trước khi tính tiền!`);
    return;
  }

  // Tính tổng từ merged (chính xác hơn)
  const total = merged.reduce((s,it) => s + it.price * (it.qty||1), 0);

  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>💳 Tính tiền – Bàn ${currentTableId.replace('t','')}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div style="margin-bottom:14px;max-height:220px;overflow-y:auto">
        ${merged.map(it=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span>${it.name}${it.size?' ('+it.size+')':''}${it.toppings&&it.toppings.length?' +'+it.toppings.join(','):''} ×${it.qty||1}</span>
          <span style="color:var(--accent)">${fmtMoney(it.price*(it.qty||1))}</span>
        </div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:17px;font-weight:700;color:var(--accent2);margin-bottom:16px">
        <span>TỔNG</span><span>${fmtMoney(total)}</span>
      </div>
      <div class="input-row">
        <div class="field"><label>Tiền khách đưa (₫)</label><input class="inp" type="number" id="cash-in" placeholder="${total}" oninput="calcChange(${total})"></div>
        <div class="field" style="display:flex;align-items:flex-end"><div id="change-disp" style="font-size:14px;font-weight:600;padding-bottom:14px"></div></div>
      </div>
      <div class="modal-footer" style="flex-wrap:wrap;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        ${shopConfig.bankNum?`<button class="btn btn-blue btn-sm" onclick="showQR(${total})">📱 QR</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="doPrint()">🖨️ In HĐ</button>
        <button class="btn btn-green btn-sm" onclick="doCheckout()">✅ Thanh toán</button>
      </div>
    </div>`);
}

function calcChange(total) {
  const given = parseInt(document.getElementById('cash-in').value)||0;
  const change = given - total;
  document.getElementById('change-disp').innerHTML = change >= 0
    ? `<span style="color:var(--green)">Thừa: ${fmtMoney(change)}</span>`
    : `<span style="color:var(--red)">Thiếu: ${fmtMoney(-change)}</span>`;
}

function showQR(total) {
  const b = (shopConfig.bankNum||'').replace(/\s/g,'');
  const bn = shopConfig.bankName||'';
  const bank = (shopConfig.bank||'').toUpperCase().trim();
  const desc = `BAN${currentTableId.replace('t','')}`;

  // VietQR API: https://img.vietqr.io/image/{BANK}-{ACCOUNT}-compact2.png?amount=&addInfo=&accountName=
  // BANK có thể là tên viết tắt: VCB, TCB, TPB, ACB, MB, BIDV, VPB, SHB, EIB, OCB, MSB, NAB, HDB, SCB...
  const qrUrl = `https://img.vietqr.io/image/${encodeURIComponent(bank)}-${encodeURIComponent(b)}-compact2.png?amount=${total}&addInfo=${encodeURIComponent(desc)}&accountName=${encodeURIComponent(bn)}`;

  openModal(`

async function doCheckout() {
  const tableId = currentTableId;
  const ord = orders[tableId]; if (!ord) return;
  const merged = mergeOrderItems(ord.items);
  const total = merged.reduce((s,it) => s + it.price * (it.qty||1), 0);
  const tableNum = tableId.replace('t','');
  const sessionId = ord.sessionId || `${tableId}_${Date.now()}`;

  // Confirm thanh toán
  if (!confirm(`Xác nhận thanh toán Bàn ${tableNum}?\n\nTổng tiền: ${fmtMoney(total)}`)) return;

  // Lưu Firebase
  const { collection, addDoc, doc, deleteDoc, serverTimestamp } = window._firebase;
  await addDoc(collection(window._db,'history'), {
    tableId, tableNum, sessionId,
    items: ord.items||[], total,
    staffEmail: ord.staffEmail,
    staffName: ord.staffName || displayName(ord.staffEmail||''),
    mergeLog: ord.mergeLog||[],
    openedAt: ord.createdAt||null,
    closedAt: serverTimestamp(),
    closedBy: currentUser.email,
    closedByName: myName(),
    type: 'checkout'
  });
  await logHistory(tableId, `Thanh toán ${fmtMoney(total)}`, sessionId);

  // ─── PUSH LÊN GOOGLE SHEET (background, không chặn UI) ───
  pushToSheet({ tableNum, sessionId, merged, total,
                staffName: myName() }).catch(e => console.warn('sheet push fail:', e));

  // Lưu ord để in (vì sau deleteDoc thì orders[tableId] mất)
  const ordSnapshot = JSON.parse(JSON.stringify(ord));
  const mergedSnapshot = mergeOrderItems(ordSnapshot.items||[]);
  await deleteDoc(doc(window._db,'orders',tableId));
  closeModal(); closeOP();
  toast(`✅ Thanh toán xong! Bàn ${tableNum} đã trống.`, 'ok');

  // Lưu vào biến global để nút In dùng
  window._pendingPrint = { tableNum, ord: ordSnapshot, merged: mergedSnapshot, total };

  // Hỏi in bằng modal
  openModal(`
    <div class="modal" onclick="event.stopPropagation()" style="max-width:320px;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">🖨️</div>
      <div style="font-size:16px;font-weight:700;color:var(--cream);margin-bottom:8px">In hoá đơn Bàn ${tableNum}?</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px">${fmtMoney(total)}</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" style="flex:1" onclick="closeModal()">Không</button>
        <button class="btn btn-gold" style="flex:1" onclick="closeModal();doPendingPrint()">🖨️ In</button>
      </div>
    </div>`);
}

function doPendingPrint() {

function doPrint() {
  // Gọi từ nút In HĐ trong modal tính tiền (khi chưa thanh toán)
  if (!currentTableId) return;
  const ord = orders[currentTableId]; if (!ord) return;
  const merged = mergeOrderItems(ord.items);

}

function printReceipt(tableNum, ord, mergedIn, total) {
  const merged = mergedIn || mergeOrderItems(ord.items||[]);
  const calcedTotal = total != null ? total : merged.reduce((s,it)=>s+it.price*(it.qty||1),0);
  const shop = shopConfig;
  const now = new Date().toLocaleString('vi-VN');
  const mergeNote = ord.mergeLog&&ord.mergeLog.length
    ? `(Da gop: ${[...new Set(ord.mergeLog.map(l=>l.fromTableNum).filter(Boolean))].map(n=>'Ban '+n).join(', ')})`
    : '';

  // CSS bên TRONG iframe - LƯU Ý: KHÔNG ép @page size 80mm
  // để máy in A4 trên laptop cũng in được (chỉ ép khi user chọn máy in nhiệt)
  const css = `*{margin:0;padding:0;box-sizing:border-box}
html,body{width:80mm;background:#fff;color:#000;font-family:'Courier New',monospace;font-size:12px;line-height:1.35}
body{padding:3mm 2mm}.c{text-align:center}.b{font-weight:bold}.big{font-size:14px}.lg{font-size:16px}
hr{border:none;border-top:1px dashed #000;margin:4px 0}
.row{display:flex;justify-content:space-between;gap:6px;margin:2px 0}
.row .l{flex:1;word-break:break-word}.row .r{white-space:nowrap}
.foot{text-align:center;margin-top:6px;font-style:italic}.note{font-size:10px}
@media print { @page { size: 80mm auto; margin: 0 } body { width: 80mm } }`;

  const body = `
<div class="c b lg">${escapeHTML(shop.name||'CafeShop')}</div>
${shop.address?`<div class="c note">${escapeHTML(shop.address)}</div>`:''}
${shop.phone?`<div class="c note">DT: ${escapeHTML(shop.phone)}</div>`:''}
<hr>
<div class="c b big">HOA DON THANH TOAN</div>
<div class="c">Ban: ${tableNum} | ${now}</div>
<div class="c">NV: ${escapeHTML(ord.staffName||displayName(ord.staffEmail||''))}</div>
${mergeNote?`<div class="c note">${mergeNote}</div>`:''}
<hr>
${merged.map(it=>`<div class="row">
  <span class="l">${escapeHTML(it.name)}${it.size?' ('+escapeHTML(it.size)+')':''}${it.toppings&&it.toppings.length?' +'+escapeHTML(it.toppings.join(',')):''} x${it.qty||1}</span>
  <span class="r">${((it.price||0)*(it.qty||1)).toLocaleString('vi-VN')}</span>
</div>`).join('')}
<hr>
<div class="row b big"><span class="l">TONG CONG</span><span class="r">${calcedTotal.toLocaleString('vi-VN')} d</span></div>
<hr>
<div class="foot">${escapeHTML(shop.footer||'Cam on quy khach!')}<br>Hen gap lai!</div>`;

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Hoa don</title><style>${css}</style></head><body>${body}</body></html>`;

  // Chống double-click
  if (window._isPrinting) return;
  window._isPrinting = true;

  // Xoá iframe cũ
  let frame = document.getElementById('print-frame');
  if (frame) frame.remove();

  // Tạo iframe mới
  // KEY FIX: KHÔNG dùng visibility:hidden vì Chrome desktop sẽ coi như rỗng khi in.
  // Thay vào đó dùng opacity:0 + pointer-events:none + size nhỏ.
  // iframe vẫn được render bình thường, chỉ là user không thấy.
  frame = document.createElement('iframe');
  frame.id = 'print-frame';
  frame.setAttribute('aria-hidden', 'true');
  frame.style.cssText = 'position:fixed;left:0;top:0;width:80mm;height:1px;border:0;opacity:0;pointer-events:none;z-index:-1';
  document.body.appendChild(frame);

  let printed = false;
  const triggerPrint = () => {
    if (printed) return;
    printed = true;
    try {
      // Print iframe — cách này hoạt động trên cả mobile + desktop nếu iframe có nội dung
      // Quan trọng: contentWindow phải tồn tại + có document.body
      const cw = frame.contentWindow;
      if (!cw || !cw.document || !cw.document.body) {
        throw new Error('iframe chưa load xong');
      }
      cw.focus();
      cw.print();
    } catch(e) {
      console.error('print error:', e);
      toast('Lỗi in: ' + (e.message||e), 'err');
    }
    // Dọn dẹp sau khi user đóng dialog in
    setTimeout(() => {
      try { frame.remove(); } catch(e){}
      window._isPrinting = false;
    }, 3000);
  };

  // Cách load nội dung: document.write trực tiếp (ổn định hơn srcdoc trên Safari iOS)
  frame.onload = triggerPrint;

  // Fallback nếu onload không fire trong 1.5s
  setTimeout(triggerPrint, 1500);

  // Ghi nội dung vào iframe document
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
  } catch(e) {
    console.error('write iframe error:', e);
    toast('Lỗi tạo hoá đơn: ' + (e.message||e), 'err');
    window._isPrinting = false;
  }
}

function escapeHTML(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadHistory() {
  const { collection, getDocs, query, orderBy } = window._firebase;
  const tblFlt  = document.getElementById('flt-table')?.value||'';
  const fromDate = document.getElementById('flt-from')?.value;
  const toDate   = document.getElementById('flt-to')?.value;
  const typeFlt  = document.getElementById('flt-type')?.value||'';
  const area = document.getElementById('hist-area');
  if (!area) return;
  area.innerHTML = '<div class="spinner"></div>';

  try {
    // 1. Tải tất cả checkout history
    const hSnap = await getDocs(query(collection(window._db,'history'), orderBy('closedAt','desc')));
    const allCheckouts = hSnap.docs.map(d=>({id:d.id,...d.data(),_type:'checkout'}));

    // 2. Tải tất cả action log
    const aSnap = await getDocs(query(collection(window._db,'actlog'), orderBy('at','asc')));
    const allLogs = aSnap.docs.map(d=>({id:d.id,...d.data(),_type:'action'}));

    // 3. Nhóm action log theo sessionId
    const logsBySession = {};
    allLogs.forEach(d => {
      const sid = d.sessionId || `${d.tableId}_nosession`;
      if (!logsBySession[sid]) logsBySession[sid] = [];
      logsBySession[sid].push(d);
    });

    // 4. Xây dựng danh sách sessions từ checkouts
    // Mỗi checkout = 1 session đã đóng
    let sessions = allCheckouts.map(ck => {
      const sid = ck.sessionId || `${ck.tableId}_${ck.id}`;
      const logs = (logsBySession[sid]||[]).sort((a,b)=>{
        const ta = a.at?.toDate?a.at.toDate().getTime():0;
        const tb = b.at?.toDate?b.at.toDate().getTime():0;
        return ta - tb;
      });
      // Xoá log "Thanh toán" khỏi log list (đã hiển thị ở checkout block)
      const filteredLogs = logs.filter(l => !l.action?.startsWith('Thanh toán'));
      const closedAt = ck.closedAt?.toDate?ck.closedAt.toDate():new Date();
      return { sessionId:sid, tableId:ck.tableId, tableNum:ck.tableNum||ck.tableId.replace('t',''),
               checkout:ck, logs:filteredLogs, closedAt, closed:true };
    });

    // 5. Thêm sessions đang mở (có trong orders realtime)
    Object.values(orders).forEach(ord => {
      const sid = ord.sessionId || `${ord.tableId}_open`;
      if (!sessions.find(s=>s.sessionId===sid)) {
        const logs = (logsBySession[sid]||[]).sort((a,b)=>{
          const ta = a.at?.toDate?a.at.toDate().getTime():0;
          const tb = b.at?.toDate?b.at.toDate().getTime():0;
          return ta - tb;
        });
        sessions.push({ sessionId:sid, tableId:ord.tableId, tableNum:ord.tableId.replace('t',''),
                        checkout:null, logs, closedAt:new Date(), closed:false });
      }
    });

    // 6. Áp dụng filter
    if (tblFlt) sessions = sessions.filter(s=>s.tableId===tblFlt);
    if (fromDate) {
      const from = new Date(fromDate);
      sessions = sessions.filter(s=>s.closedAt >= from);
    }
    if (toDate) {
      const to = new Date(toDate); to.setHours(23,59,59);
      sessions = sessions.filter(s=>s.closedAt <= to);
    }
    if (typeFlt==='checkout') sessions = sessions.filter(s=>s.closed);
    if (typeFlt==='action')   sessions = sessions.filter(s=>!s.closed);

    // 7. Sort: mới nhất trước
    sessions.sort((a,b)=>b.closedAt.getTime()-a.closedAt.getTime());

    if (!sessions.length) { area.innerHTML='<div class="empty">Không có dữ liệu</div>'; return; }

    // 8. Render
    area.innerHTML = sessions.map((s, idx) => {
      const elId = `sess_${idx}`;
      const ck = s.checkout;
      const merged = ck ? mergeOrderItems(ck.items||[]) : [];
      const isOpen = !s.closed;

      const headerColor = isOpen ? 'var(--red)' : 'var(--green)';
      const badge = isOpen
        ? `<span class="tag tag-red">🔴 Đang phục vụ</span>`
        : `<span class="tag tag-green">✅ Đã thanh toán</span>`;
      const timeStr = ck
        ? fmtDate(ck.closedAt)
        : (s.logs[0]?.at ? fmtDate(s.logs[0].at) : 'Đang mở');
      const totalStr = ck ? `<span style="font-weight:700;color:var(--accent2)">${fmtMoney(ck.total||0)}</span>` : '';

      return `
      <div class="hist-item" style="border-left:3px solid ${headerColor};margin-bottom:12px">
        <!-- HEADER -->
        <div class="hist-head" onclick="toggleFolder('${elId}',this)" style="background:var(--surface2)">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-weight:700;font-size:15px">🪑 Bàn ${s.tableNum}</span>
              ${badge}
              ${totalStr}
            </div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${timeStr}</div>
          </div>
          <span id="fa-${elId}" style="color:var(--text3);font-size:16px">${isOpen?'▼':'▶'}</span>
        </div>

        <!-- BODY -->
        <div class="hist-body${isOpen?' open':''}" id="${elId}" style="padding:10px 12px">

          <!-- TIMELINE LOG -->
          ${s.logs.length ? `
            <div style="margin-bottom:10px">
              ${s.logs.map(l=>{
                const by = l.byName || displayName(l.by||'') || '?';
                const timeL = l.at?.toDate ? l.at.toDate().toLocaleTimeString('vi-VN') : '';
                return `<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px">
                  <span style="color:var(--text3);white-space:nowrap;min-width:60px">${timeL}</span>
                  <span style="flex:1">${l.action}</span>
                  <span style="color:var(--accent);white-space:nowrap">${by}</span>
                </div>`;
              }).join('')}
            </div>` : '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">Không có log hành động</div>'}

          <!-- CHECKOUT SUMMARY -->
          ${ck ? `
            <div style="background:var(--surface);border:1px solid var(--green);border-radius:8px;padding:10px;margin-top:4px">
              <div style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:8px">
                💳 Thanh toán bởi <strong>${ck.closedByName || displayName(ck.closedBy||'')}</strong>
                &nbsp;·&nbsp; ${fmtDate(ck.closedAt)}
              </div>
              ${merged.map(it=>`
                <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)">
                  <span>${it.name}${it.size?' ('+it.size+')':''}${it.toppings&&it.toppings.length?' +'+it.toppings.join(','):''} ×${it.qty}</span>
                  <span style="color:var(--accent)">${fmtMoney(it.price*it.qty)}</span>
                </div>`).join('')}
              <div style="display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-top:8px;padding-top:6px;border-top:2px solid var(--border)">
                <span>TỔNG</span><span style="color:var(--accent2)">${fmtMoney(ck.total||0)}</span>
              </div>
            </div>` : ''}

        </div>
      </div>`;
    }).join('');

  } catch(e) {
    console.error('loadHistory error:', e);
    area.innerHTML=`<div class="empty">Lỗi tải dữ liệu: ${e.message}</div>`;
  }
}

  const [hs, al] = await Promise.all([getDocs(collection(window._db,'history')), getDocs(collection(window._db,'actlog'))]);

// ═══════════ GOOGLE SHEET INTEGRATION ═══════════
async function pushToSheet({ tableNum, sessionId, merged, total, staffName }) {
  const now = new Date();
  const isoTs = now.toISOString();
  const dateStr = isoTs.slice(0, 10); // YYYY-MM-DD
  // Mỗi món = 1 row (line item)
  const rows = merged.map(it => [
    isoTs,
    dateStr,
    sessionId,
    String(tableNum),
    it.name || '',
    it.size || '',
    (it.toppings && it.toppings.length) ? it.toppings.join(', ') : '',
    it.qty || 1,
    it.price || 0,
    (it.price || 0) * (it.qty || 1),
    total,
    staffName || ''
  ]);
  const res = await fetch('/api/sheet', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'append', rows })
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Sheet push failed');
  return data;
}

function loadChartJs() {
  if (window.Chart) return Promise.resolve();

  _chartJsLoading = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Không tải được Chart.js'));
    document.head.appendChild(s);
  });
  return _chartJsLoading;
}

function setDataQuickRange(kind) {
  const today = new Date();
  let from = new Date();
  if (kind === 'today') from = today;
  else if (kind === '7d') from = new Date(Date.now() - 6*86400000);
  else if (kind === '30d') from = new Date(Date.now() - 29*86400000);
  else if (kind === 'month') from = new Date(today.getFullYear(), today.getMonth(), 1);
  document.getElementById('dflt-from').value = from.toISOString().slice(0,10);
  document.getElementById('dflt-to').value   = today.toISOString().slice(0,10);
  loadData();
}

async function loadData() {
  const from = document.getElementById('dflt-from').value;
  const to   = document.getElementById('dflt-to').value;
  if (!from || !to) return toast('Chọn khoảng ngày', 'err');
  if (from > to) return toast('Từ ngày phải ≤ đến ngày', 'err');

  const area = document.getElementById('data-area');
  const sumArea = document.getElementById('data-summary');
  area.innerHTML = '<div class="spinner"></div>';
  sumArea.innerHTML = '';

  try {
    const res = await fetch(`/api/sheet?action=read&fromDate=${from}&toDate=${to}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Lỗi đọc Sheet');

    _dataCache = { rows: data.rows || [], from, to };
    await loadChartJs();
    renderDataAnalysis();
  } catch(e) {
    console.error('loadData error:', e);
    area.innerHTML = `<div class="empty">❌ Lỗi: ${e.message}<br><br>Kiểm tra:<br>
      • Env var <code>TOKEN_GOOGLE_SHEEET</code> trên Vercel<br>
      • Apps Script đã deploy "Anyone access"<br>
      • Sheet có dữ liệu (cần thanh toán ít nhất 1 đơn)
    </div>`;
  }
}

// ─── DOANH THU: state ───
let _revMode = 'day'; // 'day' | 'month' | 'year'
let _revCompareOn = false;

function setRevMode(mode) {
  _revMode = mode;
  document.querySelectorAll('.rev-tab').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-mode') === mode);
  });
  renderRevSection();
}

function toggleRevCompare() {
  _revCompareOn = document.getElementById('rev-compare-chk').checked;
  const rangeBox = document.getElementById('rev-compare-range');
  if (rangeBox) rangeBox.style.display = _revCompareOn ? 'block' : 'none';
  // Mặc định lần đầu bật: set theo "Tháng này vs trước"
  if (_revCompareOn && !document.getElementById('rev-a-from').value) {
    setRevQuickCompare('thisVsLastMonth');
    return; // setRevQuickCompare đã gọi renderRevSection rồi
  }
  renderRevSection();
}

// Set 2 khoảng so sánh nhanh
function setRevQuickCompare(kind) {
  const today = new Date();
  let aFrom, aTo, bFrom, bTo;
  if (kind === 'thisVsLastMonth') {
    aFrom = new Date(today.getFullYear(), today.getMonth(), 1);
    aTo   = today;
    bFrom = new Date(today.getFullYear(), today.getMonth()-1, 1);
    bTo   = new Date(today.getFullYear(), today.getMonth(), 0); // ngày cuối tháng trước
  } else if (kind === 'thisVsLastWeek') {
    const day = today.getDay() || 7; // CN=0 → 7
    aFrom = new Date(today); aFrom.setDate(today.getDate() - day + 1);
    aTo = today;
    bTo = new Date(aFrom); bTo.setDate(aFrom.getDate() - 1);
    bFrom = new Date(bTo); bFrom.setDate(bTo.getDate() - 6);
  } else if (kind === 'thisVsLastYear') {
    aFrom = new Date(today.getFullYear(), 0, 1);
    aTo   = today;
    bFrom = new Date(today.getFullYear()-1, 0, 1);
    bTo   = new Date(today.getFullYear()-1, 11, 31);
  } else if (kind === 'last7Vs7') {
    aTo = today;
    aFrom = new Date(today); aFrom.setDate(today.getDate() - 6);
    bTo = new Date(aFrom); bTo.setDate(aFrom.getDate() - 1);
    bFrom = new Date(bTo); bFrom.setDate(bTo.getDate() - 6);
  }
  document.getElementById('rev-a-from').value = aFrom.toISOString().slice(0,10);
  document.getElementById('rev-a-to').value   = aTo.toISOString().slice(0,10);
  document.getElementById('rev-b-from').value = bFrom.toISOString().slice(0,10);
  document.getElementById('rev-b-to').value   = bTo.toISOString().slice(0,10);
  renderRevSection();
}

// Gom rows theo mode (day/month/year) -> Map key->revenue
function _aggregateRevenue(rows, mode, fromDate, toDate) {
  const map = {};
  rows.forEach(r => {
    const d = String(r.Date||'').slice(0,10);
    if (!d) return;
    if (fromDate && d < fromDate) return;
    if (toDate && d > toDate) return;
    let key;
    if (mode === 'day')        key = d;                    // 2026-05-23
    else if (mode === 'month') key = d.slice(0, 7);        // 2026-05
    else                       key = d.slice(0, 4);        // 2026
    map[key] = (map[key]||0) + Number(r.LineTotal||0);
  });
  return map;
}

// Generate danh sách key liền mạch giữa from-to theo mode
function _genKeyRange(fromDate, toDate, mode) {
  const keys = [];
  if (!fromDate || !toDate) return keys;
  if (mode === 'day') {
    let cur = new Date(fromDate);
    const end = new Date(toDate);
    while (cur <= end) {
      keys.push(cur.toISOString().slice(0,10));
      cur.setDate(cur.getDate()+1);
      if (keys.length > 1000) break;
    }
  } else if (mode === 'month') {
    let cur = new Date(fromDate.slice(0,7)+'-01');
    const end = new Date(toDate.slice(0,7)+'-01');
    while (cur <= end) {
      keys.push(cur.toISOString().slice(0,7));
      cur.setMonth(cur.getMonth()+1);
      if (keys.length > 240) break; // 20 năm tối đa
    }
  } else { // year
    const fy = parseInt(fromDate.slice(0,4), 10);
    const ty = parseInt(toDate.slice(0,4), 10);
    for (let y = fy; y <= ty; y++) {
      keys.push(String(y));
      if (keys.length > 50) break;
    }
  }
  return keys;
}

// Render section doanh thu (gọi mỗi khi đổi mode hoặc compare)
function renderRevSection() {
  if (!_dataCache || !_dataCache.rows) return;
  const { rows, from, to } = _dataCache;

  if (_revCompareOn) {
    const aFrom = document.getElementById('rev-a-from').value;
    const aTo   = document.getElementById('rev-a-to').value;
    const bFrom = document.getElementById('rev-b-from').value;
    const bTo   = document.getElementById('rev-b-to').value;
    if (!aFrom || !aTo || !bFrom || !bTo) {
      drawRevChart([], [], [], null, null);
      return;
    }
    const aMap = _aggregateRevenue(rows, _revMode, aFrom, aTo);
    const bMap = _aggregateRevenue(rows, _revMode, bFrom, bTo);
    const aKeys = _genKeyRange(aFrom, aTo, _revMode);
    const bKeys = _genKeyRange(bFrom, bTo, _revMode);
    const aTotal = Object.values(aMap).reduce((s,v)=>s+v, 0);
    const bTotal = Object.values(bMap).reduce((s,v)=>s+v, 0);
    const diff = aTotal - bTotal;
    const diffPct = bTotal > 0 ? ((diff/bTotal)*100) : (aTotal > 0 ? 100 : 0);
    const diffColor = diff >= 0 ? 'var(--accent2)' : '#e0654a';
    const diffSign = diff >= 0 ? '+' : '';

    // Chart: căn cả 2 series về cùng index (1..max(len)) để xem song song
    // Mỗi cột tương ứng với "kỳ ngày thứ N" của mỗi khoảng
    const maxLen = Math.max(aKeys.length, bKeys.length);
    const labels = [];
    const aValues = [];
    const bValues = [];
    const aLabels = []; // để show trong tooltip
    const bLabels = [];
    for (let i = 0; i < maxLen; i++) {
      labels.push(_fmtKeyShort(aKeys[i] || bKeys[i] || '', _revMode, i));
      aValues.push(aKeys[i] ? (aMap[aKeys[i]]||0) : null);
      bValues.push(bKeys[i] ? (bMap[bKeys[i]]||0) : null);
      aLabels.push(aKeys[i] || '');
      bLabels.push(bKeys[i] || '');
    }

    // Stats row
    document.getElementById('rev-compare-stats').innerHTML = `
      <div class="rev-compare-stats">
        <div class="rev-stat" style="border-left:3px solid var(--accent2)">
          <div class="rev-stat-label">Kỳ A · ${escapeHTML(aFrom)} → ${escapeHTML(aTo)}</div>
          <div class="rev-stat-val" style="color:var(--accent2)">${fmtMoney(aTotal)} ₫</div>
          <div class="rev-stat-sub">${aKeys.length} ${_modeLabel(_revMode)}</div>
        </div>
        <div class="rev-stat" style="border-left:3px solid #5a8fc9">
          <div class="rev-stat-label">Kỳ B · ${escapeHTML(bFrom)} → ${escapeHTML(bTo)}</div>
          <div class="rev-stat-val" style="color:#5a8fc9">${fmtMoney(bTotal)} ₫</div>
          <div class="rev-stat-sub">${bKeys.length} ${_modeLabel(_revMode)}</div>
        </div>
        <div class="rev-stat" style="border-left:3px solid ${diffColor}">
          <div class="rev-stat-label">Chênh lệch (A−B)</div>
          <div class="rev-stat-val" style="color:${diffColor}">${diffSign}${fmtMoney(diff)} ₫</div>
          <div class="rev-stat-sub" style="color:${diffColor}">${diffSign}${diffPct.toFixed(1)}%</div>
        </div>
      </div>
    `;

    drawRevChart(labels, aValues, bValues, aLabels, bLabels);
  } else {
    // Chế độ thường: lấy theo from-to của _dataCache
    const map = _aggregateRevenue(rows, _revMode, from, to);
    const keys = _genKeyRange(from, to, _revMode);
    const labels = keys.map((k, i) => _fmtKeyShort(k, _revMode, i));
    const values = keys.map(k => map[k]||0);
    document.getElementById('rev-compare-stats').innerHTML = '';
    drawRevChart(labels, values, null, keys, null);
  }
}

function _modeLabel(mode) {
  return mode === 'day' ? 'ngày' : mode === 'month' ? 'tháng' : 'năm';
}

// Format key (2026-05-23 / 2026-05 / 2026) cho compact hiển thị trên trục X
function _fmtKeyShort(k, mode, idx) {
  if (!k) return '';
  if (mode === 'day')   return k.slice(5);          // 05-23
  if (mode === 'month') {
    // Hiện "T5/26" thay vì "2026-05" cho gọn
    const [y, m] = k.split('-');
    return 'T' + parseInt(m,10) + '/' + y.slice(2);
  }
  return k; // năm: giữ "2026"
}

// Vẽ biểu đồ — dataset thứ 2 = null nếu không compare
function drawRevChart(labels, valuesA, valuesB, rawLabelsA, rawLabelsB) {
  const ctx = document.getElementById('chart-revenue');
  if (!ctx || !window.Chart) return;
  if (_revenueChart) { _revenueChart.destroy(); _revenueChart = null; }

  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#c9a84c';
  const accent2 = getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim() || '#e8c96a';
  const text3 = getComputedStyle(document.documentElement).getPropertyValue('--text3').trim() || '#6b5f52';
  const border = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#3a332c';
  const cream  = getComputedStyle(document.documentElement).getPropertyValue('--cream').trim() || '#f5ead8';

  const fmtShort = (v) => {
    if (v == null) return '';
    if (v >= 1e6) return (v/1e6).toFixed(v >= 10e6 ? 0 : 1) + 'M';
    if (v >= 1000) return Math.round(v/1000) + 'k';
    return String(v||0);
  };

  const datasets = [{
    label: valuesB ? 'Kỳ A' : 'Doanh thu',
    data: valuesA,
    backgroundColor: accent + 'cc',
    borderColor: accent2,
    borderWidth: 1,
    borderRadius: 4,
    _rawLabels: rawLabelsA,
  }];
  if (valuesB) {
    datasets.push({
      label: 'Kỳ B',
      data: valuesB,
      backgroundColor: 'rgba(90,143,201,.65)',
      borderColor: '#5a8fc9',
      borderWidth: 1,
      borderRadius: 4,
      _rawLabels: rawLabelsB,
    });
  }

  // Plugin vẽ giá trị trên đỉnh cột (chỉ khi không compare để khỏi rối)
  const topLabelPlugin = {
    id: 'topLabel',
    afterDatasetsDraw(chart) {
      if (chart.data.datasets.length > 1) return; // không hiện khi compare
      const c = chart.ctx;
      chart.data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        meta.data.forEach((el, i) => {
          const v = ds.data[i];
          if (!v) return;
          c.save();
          c.fillStyle = cream;
          c.font = 'bold 11px "DM Sans", sans-serif';
          c.textAlign = 'center';
          c.textBaseline = 'bottom';
          c.fillText(fmtShort(v), el.x, el.y - 4);
          c.restore();
        });
      });
    }
  };

  _revenueChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 22 } },
      plugins: {
        legend: {
          display: !!valuesB,
          labels: { color: text3, usePointStyle: true, padding: 12 }
        },
        tooltip: {
          callbacks: {
            title: (items) => {
              if (!items.length) return '';
              const ds = items[0].dataset;
              const idx = items[0].dataIndex;
              const raw = ds._rawLabels ? ds._rawLabels[idx] : items[0].label;
              return raw || items[0].label;
            },
            label: (c) => `${c.dataset.label}: ${fmtMoney(c.parsed.y||0)} ₫`
          }
        }
      },
      scales: {
        x: { ticks: { color: text3 }, grid: { color: border } },
        y: {
          ticks: { color: text3, callback: v => fmtShort(v) },
          grid: { color: border }
        }
      }
    },
    plugins: [topLabelPlugin]
  });
}

// Palette màu cho multi-line trend (đảm bảo các món có màu khác nhau, dễ nhìn)
const TREND_PALETTE = [
  '#c9a84c', '#3dbfa0', '#d4627a', '#7b72e9', '#6b9e5e',
  '#4a9eff', '#e09a30', '#5a8fc9', '#e05a4e', '#88bb7a',
  '#b8843d', '#9e97f5', '#f0849a', '#5ed9bc', '#f5b84a',
  '#d4a05a', '#6db4ff', '#5aab7a'
];

function renderTrendAll(topItems) {
  const ctx = document.getElementById('chart-trend');
  if (!ctx || !window.Chart) return;
  if (_trendChart) { _trendChart.destroy(); _trendChart = null; }
  if (!topItems || !topItems.length) return;

  // CHỈ vẽ top 10 món bán chạy nhất để biểu đồ không rối
  const totalItems = topItems.length;
  const showItems = topItems.slice(0, 10);
  const hiddenCount = totalItems - showItems.length;
  // Hiện note dưới chart nếu có món bị ẩn
  const noteEl = document.getElementById('chart-trend-note');
  if (noteEl) {
    noteEl.textContent = hiddenCount > 0
      ? `Đang hiện ${showItems.length}/${totalItems} món bán chạy nhất · ${hiddenCount} món có doanh số thấp đã ẩn`
      : `Đang hiện toàn bộ ${showItems.length} món`;
  }

  // Tạo danh sách ngày liền mạch trong khoảng filter
  const { from, to } = _dataCache;
  const dateKeys = [];
  let cur = new Date(from);
  const end = new Date(to);
  while (cur <= end) {
    dateKeys.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
    if (dateKeys.length > 366) break; // safety
  }
  const displayLabels = dateKeys.map(d => d.slice(5)); // chỉ hiện MM-DD

  // Một dataset cho mỗi món (xếp theo top bán chạy)
  const datasets = showItems.map((it, i) => {
    const dayMap = {};
    _dataCache.rows.forEach(r => {
      if (r.ItemName !== it.name) return;
      const d = String(r.Date||'').slice(0,10);
      if (!d) return;
      dayMap[d] = (dayMap[d]||0) + Number(r.Qty||0);
    });
    const color = TREND_PALETTE[i % TREND_PALETTE.length];
    return {
      label: it.name + ` (${it.qty})`,
      data: dateKeys.map(d => dayMap[d] || 0),
      borderColor: color,
      backgroundColor: color + '20',
      tension: 0.3,
      borderWidth: 2,
      pointRadius: 2,
      pointHoverRadius: 5,

  const text2  = getComputedStyle(document.documentElement).getPropertyValue('--text2').trim() || '#b0a090';
  const border = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#3a332c';

  _trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels: displayLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: {
            color: text2,
            boxWidth: 12,
            padding: 8,
            font: { size: 11 },
            usePointStyle: true,
          }
        },
        tooltip: {
          mode: 'index',
          intersect: false,
          // Chỉ hiện các dòng có giá trị > 0 để tooltip không quá dài
          filter: (item) => item.parsed.y > 0,
        }
      },
      scales: {
        x: { ticks: { color: text3 }, grid: { color: border } },
        y: { ticks: { color: text3, precision: 0 }, grid: { color: border }, beginAtZero: true }
      }
    }
  });
}

// Lazy-load html5-qrcode
let _qrJsLoading = null;
function loadQrJs() {
  if (window.Html5Qrcode) return Promise.resolve();
  if (_qrJsLoading) return _qrJsLoading;
  _qrJsLoading = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Không tải được thư viện quét mã vạch'));
    document.head.appendChild(s);
  });
  return _qrJsLoading;
}

      _invCache.items = data.items || [];

function invInCreateAsNew(codeRaw) {
  const inp = document.getElementById('inv-in-code');
  if (inp) inp.value = codeRaw;
  // Nếu input không phải mã chuẩn (vd: gõ "cafe" mà ko phải code), thì sinh mã KH mới
  const looksLikeCode = /^[A-Za-z0-9\-_]{3,}$/.test(codeRaw);

// Fuzzy search: chấm điểm theo độ khớp với code + name
function fuzzySearchInv(query, maxResults) {
  const q = String(query||'').toLowerCase().trim();
  if (!q) return [];
  const qNoAccent = removeAccents(q);
  const scored = [];
  _invCache.items.forEach(it => {
    const code = String(it.code||'').toLowerCase();
    const name = String(it.name||'').toLowerCase();
    const nameNA = removeAccents(name);
    let score = 0;
    // Exact match thì khỏi cần (đã xử lý ở trên)
    if (code === q)             score = 1000;
    else if (code.startsWith(q)) score = 500;   // mã bắt đầu bằng query
    else if (code.includes(q))   score = 300;   // mã chứa query
    else if (name === q)         score = 250;   // tên trùng
    else if (name.startsWith(q)) score = 200;
    else if (nameNA.startsWith(qNoAccent)) score = 180;
    else if (name.includes(q))   score = 100;
    else if (nameNA.includes(qNoAccent)) score = 80;
    // Match từng từ trong tên
    else {
      const words = nameNA.split(/\s+/);
      const qWords = qNoAccent.split(/\s+/);
      let allMatch = true;
      qWords.forEach(qw => {
        if (!qw) return;
        if (!words.some(w => w.includes(qw))) allMatch = false;
      });
      if (allMatch && qWords.length) score = 50;
    }
    if (score > 0) scored.push({ it, score });
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, maxResults || 8).map(x => x.it);
}

// Bỏ dấu tiếng Việt để search dễ
function removeAccents(s) {
  return String(s||'')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/đ/g, 'd').replace(/Đ/g, 'D');
}

function genNextCode() {
  // Tìm số lớn nhất trong các mã dạng KHxxx
  let max = 0;
  _invCache.items.forEach(it => {
    const m = String(it.code||'').match(/^KH(\d+)$/i);
    if (m) max = Math.max(max, parseInt(m[1]));
  });
  return 'KH' + String(max + 1).padStart(3, '0');
}

async function submitInvIn(code, isNew) {
  let payload;
  if (isNew) {
    const newCode = (document.getElementById('inv-in-code-new').value||'').trim().toUpperCase();
    const name = (document.getElementById('inv-in-name').value||'').trim();
    const qty  = Number(document.getElementById('inv-in-qty').value||0);
    const unit = (document.getElementById('inv-in-unit').value||'').trim();
    const price = Number(document.getElementById('inv-in-price').value||0);
    const limit = Number(document.getElementById('inv-in-limit').value||0);
    const note = (document.getElementById('inv-in-note').value||'').trim();
    if (!newCode) return toast('Thiếu mã','err');
    if (!name) return toast('Thiếu tên hàng','err');
    if (!qty || qty <= 0) return toast('Số lượng phải > 0','err');
    // Check trùng mã (đề phòng user sửa mã thành mã đã có)
    if (_invCache.items.some(it => (it.code||'').toUpperCase() === newCode)) {
      return toast('Mã này đã tồn tại, vui lòng tra trước','err');
    }
    payload = { action:'inv_in', code:newCode, name, qty, unit, price, limit, note,
                staff:myName(), isNew:true };
  } else {
    const qty  = Number(document.getElementById('inv-in-qty').value||0);
    const priceRaw = (document.getElementById('inv-in-price').value||'').trim();
    const limitRaw = (document.getElementById('inv-in-limit').value||'').trim();
    const note = (document.getElementById('inv-in-note').value||'').trim();
    if (!qty || qty <= 0) return toast('Số lượng phải > 0','err');
    payload = { action:'inv_in', code, qty, note, staff:myName(), isNew:false };
    if (priceRaw !== '') payload.price = Number(priceRaw);
    if (limitRaw !== '') payload.limit = Number(limitRaw);
  }
  await sendInvAction(payload, '✅ Đã nhập kho');
}

function invOutLookup() {
  const codeRaw = ((document.getElementById('inv-out-code').value||'')+'').trim();
  const formArea = document.getElementById('inv-out-form');
  if (!codeRaw) return toast('Nhập mã hoặc tên hàng','err');

  // 1) Exact match
  const code = codeRaw.toUpperCase();
  const exact = _invCache.items.find(x => (x.code||'').toUpperCase() === code);
  if (exact) {
    renderInvOutForm(exact);
    return;
  }

  // 2) Fuzzy search
  const matches = fuzzySearchInv(codeRaw, 8);
  if (matches.length === 0) {
    formArea.innerHTML = `<div class="empty" style="color:var(--red)">❌ Không tìm thấy hàng nào khớp với "<strong>${escapeHTML(codeRaw)}</strong>".<br>Hàng phải được nhập trước khi xuất.</div>`;
    return;
  }

  // Nếu chỉ có 1 match thì chọn luôn
  if (matches.length === 1) {
    document.getElementById('inv-out-code').value = matches[0].code;
    renderInvOutForm(matches[0]);
    return;
  }

  // Nhiều match -> show list để chọn
  formArea.innerHTML = `
    <div class="card" style="border-left:4px solid var(--accent2)">
      <div class="card-title">
        <div class="card-title-left">🔍 Có ${matches.length} kết quả gần đúng với "<strong>${escapeHTML(codeRaw)}</strong>"</div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Bấm để chọn hàng cần xuất:</div>
      <div class="inv-suggest-list">
        ${matches.map(it => `
          <div class="inv-suggest-card" onclick="invOutSelectExisting('${escapeAttr(it.code)}')">
            <div class="inv-suggest-main">
              <div><code style="font-size:12px;background:var(--bg3);padding:2px 6px;border-radius:4px">${escapeHTML(it.code)}</code></div>
              <div style="font-size:15px;font-weight:600;margin-top:4px">${escapeHTML(it.name)}</div>
              ${it.note ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">${escapeHTML(it.note)}</div>` : ''}
            </div>
            <div class="inv-suggest-stock">
              <div style="font-size:11px;color:var(--text3)">Tồn</div>
              <div style="font-size:18px;font-weight:700;color:${Number(it.stock)<=0?'var(--red)':'var(--accent2)'}">${it.stock}</div>

}
