// ─── TỒN KHO ───
function renderInvList() {
  // Sort: hết hàng (stock<=0) lên ĐẦU, rồi đến sắp hết (stock<limit), rồi đến đủ, alphabet trong từng nhóm
  const items = [..._invCache.items].sort((a, b) => {
    const sa = Number(a.stock||0), sb = Number(b.stock||0);
    const la = Number(a.limit||0), lb = Number(b.limit||0);
    const aOut = sa <= 0, bOut = sb <= 0;
    const aLow = la > 0 && sa > 0 && sa < la;
    const bLow = lb > 0 && sb > 0 && sb < lb;
    // Mức ưu tiên: 0 = hết, 1 = sắp hết, 2 = bình thường
    const pa = aOut ? 0 : (aLow ? 1 : 2);
    const pb = bOut ? 0 : (bLow ? 1 : 2);
    if (pa !== pb) return pa - pb;
    return String(a.name||'').localeCompare(String(b.name||''), 'vi');
  });

  const totalValue = items.reduce((s, it) => s + (Number(it.stock||0) * Number(it.price||0)), 0);
  const outCount = items.filter(it => Number(it.stock||0) <= 0).length;
  const lowCount = items.filter(it => {
    const s = Number(it.stock||0), l = Number(it.limit||0);
    return l > 0 && s > 0 && s < l;
  }).length;

  document.getElementById('inv-content').innerHTML = `
    <div class="card">
      <div class="card-title">
        <div class="card-title-left">📊 Tồn kho hiện tại</div>
        <span class="tag tag-gold">${items.length} mặt hàng · Tổng giá trị: ${fmtMoney(totalValue)} ₫</span>
      </div>

      ${(outCount + lowCount) > 0 ? `
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          ${outCount > 0 ? `<span class="inv-pill inv-pill-red">❌ ${outCount} mặt hàng đã HẾT</span>` : ''}
          ${lowCount > 0 ? `<span class="inv-pill inv-pill-orange">⚠️ ${lowCount} mặt hàng SẮP HẾT</span>` : ''}
        </div>
      ` : ''}

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <input class="inp inp-sm" id="inv-search" placeholder="🔍 Tìm theo tên hoặc mã..." oninput="filterInvList()" style="flex:1;min-width:200px">
        <select class="inp inp-sm" id="inv-filter-status" onchange="filterInvList()" style="max-width:180px">
          <option value="all">Tất cả</option>
          <option value="alert">⚠️ Chỉ hàng cảnh báo</option>
          <option value="out">❌ Đã hết</option>
          <option value="low">⚠️ Sắp hết</option>
          <option value="ok">✅ Đủ tồn</option>
        </select>
      </div>

      <div class="tbl-wrap">
        <table id="inv-table" class="tbl-nowrap">
          <thead>
            <tr>
              <th>Trạng thái</th>
              <th>Mã</th><th>Tên hàng</th>
              <th style="text-align:right">Tồn</th>
              <th style="text-align:right">Ngưỡng</th>
              <th>ĐV</th>
              <th style="text-align:right">Giá nhập</th>
              <th style="text-align:right">Giá trị</th>
              <th>Cập nhật cuối</th>
              <th style="text-align:center">Thao tác</th>
            </tr>
          </thead>
          <tbody>
            ${items.length ? items.map(it => {
              const stock = Number(it.stock||0);
              const limit = Number(it.limit||0);
              const isOut = stock <= 0;
              const isLow = limit > 0 && stock > 0 && stock < limit;
              let statusBadge = '<span class="inv-status inv-status-ok">✅ Đủ</span>';
              let statusKey = 'ok';
              let rowStyle = '';
              if (isOut) {
                statusBadge = '<span class="inv-status inv-status-out">❌ HẾT</span>';
                statusKey = 'out';
                rowStyle = 'background:rgba(220,53,69,.12)';
              } else if (isLow) {
                statusBadge = '<span class="inv-status inv-status-low">⚠️ Sắp hết</span>';
                statusKey = 'low';
                rowStyle = 'background:rgba(255,159,28,.10)';
              }
              const stockColor = isOut ? 'var(--red)' : (isLow ? '#ff9f1c' : 'var(--accent2)');
              return `
                <tr data-name="${escapeAttr((it.name||'').toLowerCase())}" data-code="${escapeAttr((it.code||'').toLowerCase())}" data-status="${statusKey}" style="${rowStyle}">
                  <td>${statusBadge}</td>
                  <td><strong>${escapeHTML(it.code)}</strong></td>
                  <td class="wrap">${escapeHTML(it.name)}</td>
                  <td style="text-align:right;font-weight:700;font-size:15px;color:${stockColor}">${stock}</td>
                  <td style="text-align:right">
                    <button class="inv-limit-btn" onclick="editInvLimit('${escapeAttr(it.code)}')" title="Bấm để sửa ngưỡng">
                      ${limit>0 ? limit : '<span style="color:var(--text3);font-weight:400">+ Đặt</span>'}
                    </button>
                  </td>
                  <td>${escapeHTML(it.unit||'')}</td>
                  <td style="text-align:right">${fmtMoney(it.price||0)}</td>
                  <td style="text-align:right;color:var(--text3)">${fmtMoney(stock * Number(it.price||0))}</td>
                  <td style="color:var(--text3);font-size:12px">${escapeHTML((it.updatedAt||'').slice(0,16).replace('T',' '))}</td>
                  <td style="text-align:center;white-space:nowrap">
                    <button class="btn btn-outline btn-xs" onclick="editInvItem('${escapeAttr(it.code)}')" title="Sửa mã/tên">✏️</button>
                    <button class="btn btn-outline btn-xs" onclick="confirmDeleteInvItem('${escapeAttr(it.code)}')" title="Xoá mặt hàng" style="color:var(--red);border-color:var(--red)">🗑</button>
                  </td>
                </tr>
              `;
            }).join('') : '<tr><td colspan="10" class="empty">Kho chưa có mặt hàng nào</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
  // Trigger filter ngay nếu mặc định là 'alert'
  filterInvList();
}

function filterInvList() {
  const q = (document.getElementById('inv-search')?.value||'').trim().toLowerCase();
  const f = document.getElementById('inv-filter-status')?.value || 'all';
  document.querySelectorAll('#inv-table tbody tr').forEach(tr => {
    const name = tr.getAttribute('data-name')||'';
    const code = tr.getAttribute('data-code')||'';
    const st = tr.getAttribute('data-status')||'';
    let show = (!q || name.includes(q) || code.includes(q));
    if (show && f !== 'all') {
      if (f === 'alert') show = (st === 'out' || st === 'low');
      else show = (st === f);
    }
    tr.style.display = show ? '' : 'none';
  });
}

        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeLimitModal()">Huỷ</button>

        </div>
      </div>

function closeLimitModal() {
  document.getElementById('modal-wrap').innerHTML = '';
}

async function saveInvLimit(code) {
  const inp = document.getElementById('inv-limit-input');
  if (!inp) return;
  const limit = Number(inp.value);
  if (isNaN(limit) || limit < 0) return toast('Ngưỡng phải >= 0','err');

  // Disable nút trong khi gửi (chống double-click)
  const btns = document.querySelectorAll('.modal [onclick*="saveInvLimit"], .modal [onclick*="closeLimitModal"]');
  const states = [];
  btns.forEach(b => {
    states.push({ el: b, html: b.innerHTML, disabled: b.disabled });
    b.disabled = true;
    if (b.classList.contains('btn-gold')) {
      b.innerHTML = '<span class="spinner-inline"></span> Đang lưu...';
    }
    b.style.opacity = '0.6';
    b.style.cursor = 'not-allowed';
  });

  try {
    const res = await fetch('/api/sheet', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'inv_set_limit', code, limit, staff: myName() })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Lỗi không xác định');
    toast(limit > 0 ? `✅ Đã đặt ngưỡng = ${limit}` : '✅ Đã bỏ cảnh báo', 'ok');
    closeLimitModal();
    _invCache.loaded = false;
    await loadInventory(true);
  } catch(e) {
    toast('❌ '+e.message, 'err');
    states.forEach(s => {
      try {
        s.el.disabled = s.disabled;
        s.el.innerHTML = s.html;
        s.el.style.opacity = '';
        s.el.style.cursor = '';
      } catch(err){}
    });
  }
}

async function submitEditInvItem(oldCode) {
  const newCode = (document.getElementById('invedit-code').value||'').trim().toUpperCase();
  const name = (document.getElementById('invedit-name').value||'').trim();
  const unit = (document.getElementById('invedit-unit').value||'').trim();
  const price = Number(document.getElementById('invedit-price').value||0);
  const note = (document.getElementById('invedit-note').value||'').trim();

  if (!newCode) return toast('Mã không được rỗng','err');
  if (!name) return toast('Tên không được rỗng','err');

  // Nếu đổi mã, check trùng
  if (newCode !== String(oldCode).toUpperCase()) {
    if (_invCache.items.some(it => (it.code||'').toUpperCase() === newCode)) {
      return toast('Mã "' + newCode + '" đã tồn tại trong kho','err');
    }
    if (!confirm(`Đổi mã từ "${oldCode}" sang "${newCode}"?\nLịch sử cũ sẽ tự động được cập nhật.`)) return;
  }

  // Disable nút
  const btns = document.querySelectorAll('.modal [onclick*="submitEditInvItem"], .modal [onclick*="closeLimitModal"]');
  const states = [];
  btns.forEach(b => {
    states.push({ el: b, html: b.innerHTML, disabled: b.disabled });
    b.disabled = true;
    if (b.classList.contains('btn-gold')) {
      b.innerHTML = '<span class="spinner-inline"></span> Đang lưu...';
    }
    b.style.opacity = '0.6';
  });

  try {
    const res = await fetch('/api/sheet', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action:'inv_edit',
        oldCode, newCode, name, unit, price, note,
        staff: myName()
      })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Lỗi không xác định');
    toast('✅ Đã cập nhật mặt hàng', 'ok');
    closeLimitModal();
    _invCache.loaded = false;
    await loadInventory(true);
  } catch(e) {
    toast('❌ '+e.message, 'err');
    states.forEach(s => {
      try {
        s.el.disabled = s.disabled;
        s.el.innerHTML = s.html;
        s.el.style.opacity = '';
      } catch(err){}
    });
  }
}

function renderInvLogTable() {
  const from = document.getElementById('invlog-from')?.value || '';
  const to   = document.getElementById('invlog-to')?.value || '';
  const typeFilter = document.getElementById('invlog-type')?.value || '';

  let logs = [..._invCache.logs];
  if (from) logs = logs.filter(l => String(l.date||'') >= from);
  if (to)   logs = logs.filter(l => String(l.date||'') <= to);
  if (typeFilter) logs = logs.filter(l => l.type === typeFilter);
  logs.sort((a,b) => String(b.timestamp||'').localeCompare(String(a.timestamp||'')));

  const totalIn  = logs.filter(l => l.type==='IN').reduce((s,l)=>s+Number(l.qty||0),0);
  const totalOut = logs.filter(l => l.type==='OUT').reduce((s,l)=>s+Number(l.qty||0),0);
  const adminActions = logs.filter(l => ['LIMIT','EDIT','DELETE'].includes(l.type)).length;

  document.getElementById('invlog-table-wrap').innerHTML = `
    <div class="stats-grid" style="margin-bottom:12px">
      <div class="stat"><div class="stat-label">📥 Nhập</div><div class="stat-val" style="color:var(--green)">${totalIn}</div><div class="stat-sub">${logs.filter(l=>l.type==='IN').length} lần</div></div>
      <div class="stat"><div class="stat-label">📤 Xuất</div><div class="stat-val" style="color:var(--red)">${totalOut}</div><div class="stat-sub">${logs.filter(l=>l.type==='OUT').length} lần</div></div>
      <div class="stat"><div class="stat-label">⚙️ Thao tác khác</div><div class="stat-val" style="color:var(--accent2)">${adminActions}</div><div class="stat-sub">Sửa / Xoá / Đổi ngưỡng</div></div>
      <div class="stat"><div class="stat-label">Tổng dòng</div><div class="stat-val">${logs.length}</div><div class="stat-sub">${from} → ${to}</div></div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl-nowrap">
        <thead>
          <tr><th>Thời gian</th><th>Loại</th><th>Mã</th><th>Tên</th><th style="text-align:right">SL</th><th>Ghi chú</th><th>NV</th></tr>
        </thead>
        <tbody>
          ${logs.length ? logs.map(l => {
            const t = l.type || '';
            // Map mỗi loại sang badge + màu QTY
            let badge, qtyColor, qtyPrefix, qtyText;
            if (t === 'IN') {
              badge = '<span class="tag tag-green">📥 Nhập</span>';
              qtyColor = 'var(--green)'; qtyPrefix = '+'; qtyText = l.qty;
            } else if (t === 'OUT') {
              badge = '<span class="tag tag-red">📤 Xuất</span>';
              qtyColor = 'var(--red)'; qtyPrefix = '-'; qtyText = l.qty;
            } else if (t === 'LIMIT') {
              badge = '<span class="tag tag-gold">⚠️ Đổi ngưỡng</span>';
              qtyColor = 'var(--accent2)'; qtyPrefix = ''; qtyText = '→ ' + l.qty;
            } else if (t === 'EDIT') {
              badge = '<span class="tag tag-blue">✏️ Sửa</span>';
              qtyColor = 'var(--text3)'; qtyPrefix = ''; qtyText = '—';
            } else if (t === 'DELETE') {
              badge = '<span class="tag tag-red">🗑 Xoá</span>';
              qtyColor = 'var(--text3)'; qtyPrefix = ''; qtyText = l.qty || '—';
            } else {
              badge = '<span class="tag tag-gold">⚙️ ' + escapeHTML(t) + '</span>';
              qtyColor = 'var(--accent2)'; qtyPrefix = ''; qtyText = l.qty || '—';
            }
            return `
            <tr>
              <td style="color:var(--text3);font-size:12px">${escapeHTML(String(l.timestamp||'').slice(0,16).replace('T',' '))}</td>
              <td>${badge}</td>
              <td><strong>${escapeHTML(l.code||'')}</strong></td>
              <td class="wrap">${escapeHTML(l.name||'')}</td>
              <td style="text-align:right;font-weight:600;color:${qtyColor}">${qtyPrefix}${qtyText}</td>
              <td class="wrap" style="color:var(--text3)">${escapeHTML(l.note||'')}</td>
              <td style="color:var(--text3);font-size:12px">${escapeHTML(l.staff||'')}</td>
            </tr>`;
          }).join('') : '<tr><td colspan="7" class="empty">Chưa có giao dịch</td></tr>'}
        </tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:8px;text-align:center;font-style:italic">
      ${logs.length > 0 ? '💡 Cuộn ngang ➡️ để xem hết các cột nếu màn hình hẹp' : ''}
    </div>
  `;
}

    if (b.classList.contains('btn-red')) {
      b.innerHTML = '<span class="spinner-inline"></span> Đang xoá...';
    }
    b.style.opacity = '0.6';
  });

  try {
    const res = await fetch('/api/sheet', {

// ─── GỬI ACTION LÊN SERVER ───
async function sendInvAction(payload, successMsg) {
  // ─── CHỐNG DOUBLE-CLICK ───
  // Disable mọi nút submit (Nhập/Xuất/Lưu) trong form đang mở
  // Match theo selector: nút có onclick chứa submitInvIn/submitInvOut/saveInv...
  const allBtns = document.querySelectorAll(
    '[onclick*="submitInvIn"], [onclick*="submitInvOut"], [onclick*="saveInv"], [onclick*="cancelInvForm"]'
  );
  const btnStates = [];
  allBtns.forEach(b => {
    btnStates.push({ el: b, html: b.innerHTML, disabled: b.disabled });
    b.disabled = true;
    if (b.classList.contains('btn-green') || b.classList.contains('btn-red') || b.classList.contains('btn-gold')) {
      b.innerHTML = '<span class="spinner-inline"></span> Đang xử lý...';
    }
    b.style.opacity = '0.6';
    b.style.cursor = 'not-allowed';
  });

  toast('Đang xử lý...','info');
  try {
    const res = await fetch('/api/sheet', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Lỗi không xác định');
    toast(successMsg, 'ok');
    // Reload cache
    _invCache.loaded = false;
    await loadInventory(true);
    cancelInvForm();
  } catch(e) {
    toast('❌ '+e.message, 'err');
    // CHỈ khôi phục button khi LỖI - vì nếu thành công form đã đóng rồi
    btnStates.forEach(s => {
      try {
        s.el.disabled = s.disabled;
        s.el.innerHTML = s.html;
        s.el.style.opacity = '';
        s.el.style.cursor = '';
      } catch(err){}
    });
  }
}

    const stat = document.getElementById('qr-status');
    if (stat) stat.innerHTML = `<span style="color:var(--red)">❌ ${e.message||e}</span><br><span>Hãy gõ mã bằng tay vào ô dưới ↓</span>`;
    setTimeout(() => document.getElementById('qr-manual')?.focus(), 200);
  }
}

let _qrCurrentFacing = 'environment';
let _qrTrack = null;
let _qrFlashOn = false;

async function startScannerWithFacing(facing) {
  _qrCurrentFacing = facing;
  if (_qrScanner) {
    try { await _qrScanner.stop(); } catch(e){}
    try { _qrScanner.clear(); } catch(e){}
    _qrScanner = null;
  }
  _qrScanner = new Html5Qrcode('qr-reader', {
    // Bật detect cho TẤT CẢ format barcode + QR phổ biến
    formatsToSupport: window.Html5QrcodeSupportedFormats ? [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_93,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.DATA_MATRIX,
    ] : undefined,
    verbose: false,
  });

  const config = {
    fps: 15,
    // Khung nhỏ hơn -> user buộc phải đưa máy gần -> mã rõ -> quét được
    qrbox: (w, h) => {
      const minEdge = Math.min(w, h);
      const boxW = Math.floor(minEdge * 0.70);
      const boxH = Math.floor(boxW * 0.45);
      return { width: boxW, height: boxH };
    },
    aspectRatio: 1.3,
    disableFlip: false,
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true
    },
    // Yêu cầu camera focus liên tục + zoom 2x nếu hỗ trợ
    videoConstraints: {
      facingMode: facing,
      focusMode: 'continuous',
      advanced: [
        { focusMode: 'continuous' },
        { zoom: 2.0 }
      ]
    }
  };

  await _qrScanner.start(
    { facingMode: facing },
    config,
    (decoded) => {
      const inp = document.getElementById(_qrActiveInputId);
      if (inp) inp.value = String(decoded).trim();
      const cb = _qrOnDoneCallback;
      closeScanner();
      if (typeof cb === 'function') setTimeout(cb, 100);
    },
    () => { /* mỗi frame fail thì kệ */ }
  );

  // Lấy reference đến track để bật/tắt flash + zoom
  try {
    const videoEl = document.querySelector('#qr-reader video');
    if (videoEl && videoEl.srcObject) {
      _qrTrack = videoEl.srcObject.getVideoTracks()[0];
      const caps = _qrTrack.getCapabilities ? _qrTrack.getCapabilities() : {};

      // ZOOM: thử zoom 2x cho mã to ra
      if (caps.zoom) {
        try {
          const targetZoom = Math.min(2.0, caps.zoom.max || 2.0);
          await _qrTrack.applyConstraints({ advanced: [{ zoom: targetZoom }] });
        } catch(e) { console.warn('zoom apply:', e); }
      }

      // FOCUS: bật continuous autofocus
      if (caps.focusMode && caps.focusMode.includes('continuous')) {
        try {
          await _qrTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
        } catch(e) { console.warn('focus apply:', e); }
      }

      // FLASH: hiện nút nếu hỗ trợ
      if (caps.torch) {
        const fb = document.getElementById('qr-flash-btn');
        if (fb) fb.style.display = '';
      }

      // TAP-TO-FOCUS: user chạm màn hình -> focus điểm đó
      if (videoEl && caps.focusDistance) {
        videoEl.addEventListener('click', async () => {
          try {
            await _qrTrack.applyConstraints({
              advanced: [{ focusMode: 'manual' }, { focusMode: 'continuous' }]
            });
          } catch(e){}
        });
      }
    }
  } catch(e) { console.warn('track caps:', e); }

  const stat = document.getElementById('qr-status');
  if (stat) stat.innerHTML = '📷 <strong>Đưa máy gần ~10cm</strong> để mã chiếm gần kín khung';
}

async function switchScannerCamera() {
  const next = (_qrCurrentFacing === 'environment') ? 'user' : 'environment';
  try {
    await startScannerWithFacing(next);
    toast('Đã đổi camera ' + (next==='environment'?'sau':'trước'), 'info');
  } catch(e) {
    toast('Không đổi được camera: ' + e.message, 'err');
  }
}

async function toggleScannerFlash() {
  if (!_qrTrack) return;
  try {
    _qrFlashOn = !_qrFlashOn;
    await _qrTrack.applyConstraints({ advanced: [{ torch: _qrFlashOn }] });
    const btn = document.getElementById('qr-flash-btn');
    if (btn) btn.textContent = _qrFlashOn ? '💡 Tắt đèn' : '💡 Bật đèn';
  } catch(e) {
    toast('Không bật được đèn: ' + e.message, 'err');
  }
}

let _qrCurrentZoom = 2.0;
async function adjustScannerZoom(delta) {
  if (!_qrTrack) return toast('Camera chưa sẵn sàng','err');
  try {
    const caps = _qrTrack.getCapabilities ? _qrTrack.getCapabilities() : {};
    if (!caps.zoom) return toast('Camera không hỗ trợ zoom','err');
    const step = caps.zoom.step || 0.5;
    const newZoom = Math.max(caps.zoom.min || 1, Math.min(caps.zoom.max || 5, _qrCurrentZoom + delta * step * 2));
    await _qrTrack.applyConstraints({ advanced: [{ zoom: newZoom }] });
    _qrCurrentZoom = newZoom;
    const stat = document.getElementById('qr-status');
    if (stat) stat.innerHTML = `🔍 Zoom: <strong>${newZoom.toFixed(1)}x</strong>`;
  } catch(e) {
    toast('Lỗi zoom: ' + e.message, 'err');
  }
}

// Lưu callback để khi user gõ tay xong vẫn trigger được onDone
let _qrOnDoneCallback = null;
function _setQrOnDone(cb) { _qrOnDoneCallback = cb; }

function scannerManualSubmit() {
  const v = (document.getElementById('qr-manual')?.value || '').trim();
  if (!v) return toast('Nhập mã trước','err');
  const inp = document.getElementById(_qrActiveInputId);
  if (inp) inp.value = v;
  const cb = _qrOnDoneCallback;
  closeScanner();
  if (typeof cb === 'function') setTimeout(cb, 100);
}

async function closeScanner() {
  try {
    if (_qrScanner) {
      await _qrScanner.stop();
      _qrScanner.clear();
      _qrScanner = null;
    }
  } catch(e) {}
  _qrTrack = null;
  _qrFlashOn = false;
  document.getElementById('modal-wrap').innerHTML = '';
  _qrActiveInputId = null;
  _qrOnDoneCallback = null;
}

// Helper escape cho attribute (đề phòng tên/mã có dấu ')
function escapeAttr(s) {
  return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}
